<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Theatres Management | SimplyCinema Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container": "#201f1f", "background": "#131313", "outline": "#968e9e", "outline-variant": "#4a4452", "primary-container": "#6c3bb5", "surface-container-highest": "#353534", "surface-container-lowest": "#0e0e0e", "surface-container-low": "#1c1b1b", "primary": "#d6baff", "error": "#ffb4ab", "secondary": "#ddb7ff" }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] } } } }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body">

<div id="admin-sidebar-placeholder"></div>
<div id="admin-topbar-placeholder"></div>

<main class="pl-64 pt-20 min-h-screen">
  <div class="p-8 space-y-8">
    <div class="flex justify-between items-end">
      <div>
        <h1 class="font-headline text-3xl font-bold tracking-tight text-white mb-2">Theatres Management</h1>
        <p class="text-outline text-sm">View all theatres registered across cities.</p>
      </div>
    </div>

    <div class="bg-surface-container-low rounded-xl border border-white/5 overflow-hidden">
        <div class="p-6 border-b border-white/5 bg-surface-container-lowest uppercase tracking-widest text-[10px] text-outline font-bold grid grid-cols-12 gap-4">
            <div class="col-span-5">Theatre Name</div>
            <div class="col-span-7">City</div>
        </div>
        <div id="data-list" class="divide-y divide-white/5"></div>
    </div>
  </div>
</main>

<script>
  injectComponent("#admin-sidebar-placeholder", "../../components/admin-sidebar.html");
  injectComponent("#admin-topbar-placeholder", "../../components/admin-topbar.html");

  document.addEventListener('DOMContentLoaded', async () => {
      requireAuth(['ADMIN', 'THEATRE_OWNER']);
      const container = document.getElementById('data-list');
      container.innerHTML = '<div class="p-8 text-center text-outline">Loading theatres...</div>';

      try {
          const res = await Theatres.getAll();
          if(!res || res.length === 0) {
             container.innerHTML = '<div class="p-8 text-center text-outline">No theatres found.</div>';
             return;
          }
          container.innerHTML = '';
          res.forEach(item => {
             const row = document.createElement('div');
             row.className = 'p-6 grid grid-cols-12 gap-4 items-center hover:bg-surface-container transition-colors';
             row.innerHTML = `
                <div class="col-span-5 font-bold text-sm text-white truncate">${item.name || 'Unnamed'}</div>
                <div class="col-span-7 text-sm text-outline">${item.city?.name || 'City ID: ' + item.cityId}</div>
             `;
             container.appendChild(row);
          });
      } catch(e) {
          container.innerHTML = '<div class="p-8 text-center text-error">Failed to fetch data.</div>';
      }
  });
</script>
</body>
</html>
