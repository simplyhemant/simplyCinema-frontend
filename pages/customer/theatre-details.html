<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SimplyCinema - Theatre Showtimes</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container": "#201f1f",
            "background": "#131313",
            "outline": "#968e9e",
            "primary-fixed-dim": "#d6baff",
            "on-background": "#e5e2e1",
            "primary-container": "#6c3bb5",
            "on-surface-variant": "#ccc3d4",
            "surface-bright": "#3a3939",
            "on-primary": "#420089",
            "surface-tint": "#d6baff",
            "surface-container-highest": "#353534",
            "surface-dim": "#131313",
            "surface-container-lowest": "#0e0e0e",
            "surface-variant": "#353534",
            "surface-container-low": "#1c1b1b",
            "surface-container-high": "#2a2a2a",
            "primary": "#d6baff",
            "error": "#ffb4ab"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .hero-gradient { background: linear-gradient(to top, #131313 0%, transparent 100%); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col pt-16">

<div id="navbar-placeholder"></div>

<!-- Top header showing theatre context -->
<section class="relative py-12 w-full overflow-hidden shrink-0 border-b border-white/5 bg-surface-container-highest/20">
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-transparent pointer-events-none"></div>
    <div class="w-full px-8 max-w-7xl mx-auto flex items-start gap-6 relative z-10">
        <div class="w-16 h-16 rounded-2xl bg-surface-container border border-white/5 flex items-center justify-center text-primary shrink-0 shadow-lg">
            <span class="material-symbols-outlined text-4xl">theaters</span>
        </div>
        <div>
            <h1 id="t-name" class="text-3xl md:text-5xl font-black font-headline tracking-tighter text-white mb-2 shadow-black drop-shadow-md">Loading...</h1>
            <p id="t-address" class="text-on-surface-variant text-sm mt-1 max-w-2xl text-outline flex items-start gap-2">
                <span class="material-symbols-outlined text-sm mt-0.5">location_on</span>
                <span id="t-address-text">Fetching address...</span>
            </p>
            <div id="t-amenities" class="mt-4 flex flex-wrap gap-2">
                <!-- Amenities injected here -->
            </div>
        </div>
    </div>
</section>

<main class="flex-1 w-full max-w-7xl mx-auto px-8 py-8 space-y-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h2 class="text-xl font-bold font-headline text-white mb-1">Now Showing</h2>
            <p class="text-xs text-outline font-medium tracking-wide">Select a movie and showtime.</p>
        </div>
        <!-- Dynamic Date Filter -->
        <div id="date-selector-container" class="flex gap-2 p-1 bg-surface-container-high rounded-lg border border-white/5 shadow-inner overflow-x-auto hide-scrollbar snap-x">
            <!-- Dates generated by JS -->
        </div>
    </div>

    <!-- Movies List -->
    <div id="movies-container" class="space-y-6">
        <div class="p-10 text-center text-outline">
            <div class="full-screen-loader" style="position:static;width:24px;height:24px;margin:0 auto 10px auto;"></div>
            Finding movies playing here...
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script>
    injectComponent("#navbar-placeholder", "../../components/navbar.html");
    injectComponent("#footer-placeholder", "../../components/footer.html");

    const urlParams = new URLSearchParams(window.location.search);
    const theatreId = urlParams.get('id');

    let selectedDate = formatLocalDate(new Date());
    let allMovies = []; // Cache to avoid multiple fetches

    document.addEventListener('DOMContentLoaded', async () => {
        if (!theatreId) {
            window.location.href = '/pages/customer/home.html';
            return;
        }

        try {
            // 1. Fetch Theatre
            const theatre = await Theatres.getById(theatreId);
            if(theatre) {
                document.title = `${theatre.name} | SimplyCinema`;
                document.getElementById('t-name').innerText = theatre.name;
                document.getElementById('t-address-text').innerText = theatre.address || 'Address not listed';
                
                if(theatre.screens) {
                    const amenitiesDiv = document.getElementById('t-amenities');
                    amenitiesDiv.innerHTML = `
                         <span class="px-3 py-1 bg-surface-container border border-white/5 rounded-full text-xs text-white/70 font-bold uppercase tracking-widest shadow-sm flex items-center gap-1.5"><span class="material-symbols-outlined text-[14px]">smart_display</span> ${theatre.screens.length} Screens</span>
                         <span class="px-3 py-1 bg-green-500/10 border border-green-500/20 text-green-400 rounded-full text-xs font-bold uppercase tracking-widest shadow-sm flex items-center gap-1.5"><span class="material-symbols-outlined text-[14px]">fastfood</span> F&B Available</span>
                    `;
                }
            } else {
                throw new Error("Theatre not found");
            }

            // 2. Load all movies to map movieIds to Poster/Title
            allMovies = await Movies.getAll(0, 500);

            // 3. Load shows for this theatre
            generateDateSelector();
            await loadShowsForTheatre();

        } catch (err) {
            console.error(err);
            document.getElementById('movies-container').innerHTML = '<div class="p-10 text-center text-error bg-error/10 rounded-xl border border-error/20">Failed to load theatre details.</div>';
        }
    });

    function generateDateSelector() {
        const container = document.getElementById('date-selector-container');
        container.innerHTML = '';
        const today = new Date();
        
        for(let i=0; i<7; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            const dateStr = formatLocalDate(date);
            
            const dayName = i === 0 ? 'Today' : (i === 1 ? 'Tom' : date.toLocaleDateString('en-US', { weekday: 'short' }));
            const dayNum = date.getDate();
            const monthName = date.toLocaleDateString('en-US', { month: 'short' });

            const btn = document.createElement('button');
            btn.className = `date-btn min-w-[50px] snap-center flex flex-col items-center justify-center py-1.5 px-2 rounded-lg transition-all border ${selectedDate === dateStr ? 'bg-primary-container border-primary-container text-white shadow-md' : 'bg-transparent border-transparent text-on-surface-variant hover:text-white hover:bg-white/5'}`;
            btn.innerHTML = `
                <span class="text-[8px] uppercase tracking-widest font-bold mb-0.5 opacity-80">${dayName}</span>
                <span class="text-sm font-headline font-black leading-none">${dayNum}</span>
                <span class="text-[8px] uppercase font-medium mt-0.5 opacity-60">${monthName}</span>
            `;

            btn.onclick = () => {
                // Update selected date
                selectedDate = dateStr;
                // Update UI visually
                document.querySelectorAll('.date-btn').forEach(b => {
                    b.className = 'date-btn min-w-[50px] snap-center flex flex-col items-center justify-center py-1.5 px-2 rounded-lg transition-all border bg-transparent border-transparent text-on-surface-variant hover:text-white hover:bg-white/5';
                });
                btn.className = 'date-btn min-w-[50px] snap-center flex flex-col items-center justify-center py-1.5 px-2 rounded-lg transition-all border bg-primary-container border-primary-container text-white shadow-md';
                
                // Reload shows
                loadShowsForTheatre();
            };
            container.appendChild(btn);
        }
    }

    async function loadShowsForTheatre() {
        const container = document.getElementById('movies-container');
        
        try {
            const shows = await Shows.getByTheatre(theatreId);
            
            if(!shows || shows.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-outline bg-surface-container rounded-xl border border-white/5">This theatre currently has no scheduled shows.</div>';
                return;
            }

            // Group shows by Movie ID, filtering by selectedDate
            const movieShowsMap = {};
            let hasShowsToday = false;

            shows.forEach(show => {
                if(show.showDate !== selectedDate) return; // Only today
                if(show.status === 'CANCELLED') return;

                if(!movieShowsMap[show.movieId]) {
                    movieShowsMap[show.movieId] = [];
                }
                movieShowsMap[show.movieId].push(show);
                hasShowsToday = true;
            });

            if(!hasShowsToday) {
                container.innerHTML = '<div class="p-10 text-center text-outline bg-surface-container rounded-xl border border-white/5">No shows scheduled for today in this cinema. Try selecting a different date.</div>';
                return;
            }

            container.innerHTML = '';
            
            // Sort and Render
            Object.keys(movieShowsMap).forEach(movieIdStr => {
                const movieId = Number(movieIdStr);
                const showGroup = movieShowsMap[movieId];
                
                // Find movie info
                const movieInfo = allMovies.find(m => m.id === movieId) || { title: `Unknown Movie (ID: ${movieId})`, posterUrl: null };
                
                // Sort shows by time
                const sortedShows = showGroup.sort((a,b) => a.showTime.localeCompare(b.showTime));
                
                const card = document.createElement('div');
                card.className = 'bg-surface-container-low border border-white/5 rounded-2xl overflow-hidden hover:border-white/10 transition-colors shadow-lg flex flex-col md:flex-row';
                
                const posterUrl = movieInfo.posterUrl && movieInfo.posterUrl !== 'null' ? movieInfo.posterUrl : 'https://via.placeholder.com/150x225';

                let timesHtml = sortedShows.map(s => {
                    const t = new Date(s.startTime || ('1970-01-01T' + s.showTime)).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    return `
                        <button onclick="bookShow(${s.id}, ${movieId}, '${movieInfo.title.replace(/'/g, "\\'")}', '${posterUrl}')" class="px-5 py-2.5 rounded border border-white/10 text-sm font-bold text-white hover:bg-primary-container hover:text-white hover:border-primary transition-all duration-300 relative group flex flex-col items-center">
                            <span class="tracking-wide">${t}</span>
                            <span class="text-[9px] text-outline group-hover:text-primary-fixed uppercase mt-0.5 tracking-[0.2em] font-black">2D</span>
                        </button>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="w-full md:w-48 shrink-0 bg-surface-container-highest cursor-pointer border-r border-white/5 relative group" onclick="window.location.href='/pages/customer/movie-details.html?id=${movieId}'">
                        <img src="${posterUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                        <span class="absolute bottom-2 right-2 px-2 py-0.5 bg-black/60 backdrop-blur-md rounded text-[9px] text-white uppercase font-bold tracking-widest border border-white/10">Details</span>
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-center">
                        <h3 class="text-2xl font-black font-headline text-white mb-2 tracking-tight">${movieInfo.title}</h3>
                        <div class="flex items-center gap-2 mb-6 text-[10px] font-bold uppercase tracking-widest text-outline">
                            <span class="px-2 py-0.5 bg-surface-container rounded border border-white/5">${movieInfo.rating || 'UA'}</span>
                            <span class="px-2 py-0.5 bg-surface-container rounded border border-white/5">${movieInfo.durationMinutes ? movieInfo.durationMinutes + 'm' : '--m'}</span>
                        </div>
                        <div class="flex flex-wrap items-center gap-4">
                           ${timesHtml}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="p-10 text-center text-error bg-error/10 rounded-xl border border-error/20">Failed to load showtimes. Server might be down.</div>';
        }
    }

    function bookShow(showId, movieId, title, posterUrl) {
        // Save movie context so seat selection page has the title/poster
        sessionStorage.setItem('sc_booking', JSON.stringify({ 
             movieId: movieId, 
             title: title, 
             posterUrl: posterUrl 
        }));
        window.location.href = `/pages/customer/seat-selection.html?showId=${showId}`;
    }
</script>
</body>
</html>
