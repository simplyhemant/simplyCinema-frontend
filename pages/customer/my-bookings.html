<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>My Bookings | SimplyCinema</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container": "#201f1f",
            "background": "#131313",
            "outline": "#968e9e",
            "outline-variant": "#4a4452",
            "primary-fixed-dim": "#d6baff",
            "on-background": "#e5e2e1",
            "primary-container": "#6c3bb5",
            "on-surface-variant": "#ccc3d4",
            "surface-bright": "#3a3939",
            "surface-container-highest": "#353534",
            "surface-dim": "#131313",
            "surface-container-lowest": "#0e0e0e",
            "surface-variant": "#353534",
            "surface-container-low": "#1c1b1b",
            "surface-container-high": "#2a2a2a",
            "primary": "#d6baff",
            "error": "#ffb4ab",
            "on-primary-container": "#dcc4ff"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .auteur-gradient { background: linear-gradient(135deg, #6C3BB5 0%, #1A1A2E 100%); }
    .lume-glow:hover { box-shadow: 0 0 20px rgba(108, 59, 181, 0.5); }
    .ghost-border { outline: 1px solid rgba(74, 68, 82, 0.15); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body antialiased">

<div id="navbar-placeholder"></div>

<main class="pt-[100px] pb-20 px-4 md:px-8 max-w-5xl mx-auto min-h-screen flex flex-col">
  <!-- Profile Header -->
  <header class="mb-12">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
      <div class="flex items-center gap-6">
        <div class="relative group">
          <div class="w-24 h-24 md:w-32 md:h-32 rounded-xl overflow-hidden shadow-2xl bg-surface-container flex items-center justify-center text-4xl font-headline font-bold text-primary">
             <span id="user-initials">U</span>
          </div>
        </div>
        <div>
          <h1 class="font-headline text-3xl md:text-4xl font-bold tracking-tight text-white mb-1" id="user-name">Loading...</h1>
          <p class="text-outline font-medium tracking-wide text-sm flex items-center gap-2" id="user-email">
            <span class="material-symbols-outlined text-xs">mail</span>...
          </p>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 md:gap-8 min-w-[200px]">
        <div class="text-center bg-surface-container-low p-4 rounded-xl border border-white/5">
          <span class="block text-2xl font-bold text-primary font-headline" id="stat-total">0</span>
          <span class="text-[10px] uppercase tracking-widest text-outline font-bold">Total</span>
        </div>
        <div class="text-center bg-surface-container-low p-4 rounded-xl border border-white/5">
          <span class="block text-2xl font-bold text-primary font-headline" id="stat-upcoming">0</span>
          <span class="text-[10px] uppercase tracking-widest text-outline font-bold">Upcoming</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Filters -->
  <section class="mb-10 flex flex-wrap items-center gap-3" id="filter-tabs">
    <button data-filter="ALL" class="filter-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-primary-container text-white shadow-[0_0_15px_rgba(108,59,181,0.3)] transition-all">All</button>
    <button data-filter="UPCOMING" class="filter-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-surface-container-high text-outline hover:text-white transition-all ghost-border">Upcoming</button>
    <button data-filter="COMPLETED" class="filter-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-surface-container-high text-outline hover:text-white transition-all ghost-border">Past</button>
  </section>

  <!-- Loader -->
  <div id="loading-state" class="flex flex-col items-center justify-center py-20">
      <div class="full-screen-loader" style="position:static;width:32px;height:32px;margin-bottom:16px;"></div>
      <p class="text-outline">Loading your cinematic history...</p>
  </div>

  <!-- Bookings List -->
  <div id="bookings-list" class="space-y-8 hidden">
      <!-- Populated dynamically -->
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
      <span class="material-symbols-outlined text-6xl text-outline border border-outline-variant/30 p-6 rounded-full bg-surface-container mb-6">movie_filter</span>
      <h3 class="font-headline text-2xl text-white font-bold mb-2">No bookings found</h3>
      <p class="text-outline text-sm">You haven't made any bookings yet.</p>
      <a href="../../pages/customer/home.html" class="mt-6 px-6 py-3 bg-primary-container text-white font-bold rounded-xl transition-all hover:scale-105">Explore Movies</a>
  </div>
</main>

<div id="footer-placeholder"></div>

<script>
  injectComponent("#navbar-placeholder", "../../components/navbar.html");
  injectComponent("#footer-placeholder", "../../components/footer.html");

  let allBookings = [];
  let currentFilter = 'ALL';

  document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const user = JSON.parse(localStorage.getItem('sc_user') || "{}");
      
      document.getElementById('user-name').innerText = `${user.firstName || 'User'} ${user.lastName || ''}`.trim();
      document.getElementById('user-email').innerHTML = `<span class="material-symbols-outlined text-xs">mail</span> ${user.email || ''}`;
      if(user.firstName) {
         document.getElementById('user-initials').innerText = user.firstName.charAt(0).toUpperCase();
      }

      setupFilters();
      await fetchBookings();
  });

  function setupFilters() {
      const btns = document.querySelectorAll('.filter-btn');
      btns.forEach(btn => {
         btn.addEventListener('click', () => {
            btns.forEach(b => {
               b.className = 'filter-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-surface-container-high text-outline hover:text-white transition-all ghost-border';
            });
            btn.className = 'filter-btn px-6 py-2.5 rounded-full text-sm font-semibold bg-primary-container text-white shadow-[0_0_15px_rgba(108,59,181,0.3)] transition-all';
            currentFilter = btn.dataset.filter;
            renderBookings();
         });
      });
  }

  async function fetchBookings() {
      document.getElementById('loading-state').classList.remove('hidden');
      document.getElementById('bookings-list').classList.add('hidden');
      document.getElementById('empty-state').classList.add('hidden');

      try {
         const user = JSON.parse(localStorage.getItem('sc_user') || "{}");
         const userId = user.id;
         if(!userId) {
             showToast("User ID not found. Please log in again.", "error");
             return;
         }
         const data = await Bookings.getHistory(userId);
         allBookings = data || [];
         
         const now = new Date();
         let upcomingCount = 0;
         allBookings.forEach(b => {
            const showTime = b.showDate && b.showTime ? new Date(`${b.showDate}T${b.showTime}`) : new Date(0);
            if(showTime > now) {
               upcomingCount++;
            }
         });

         document.getElementById('stat-total').innerText = allBookings.length;
         document.getElementById('stat-upcoming').innerText = upcomingCount;

         renderBookings();
      } catch (err) {
         document.getElementById('loading-state').classList.add('hidden');
         showToast("Failed to fetch bookings.", "error");
      }
  }

  function renderBookings() {
      document.getElementById('loading-state').classList.add('hidden');
      const listContainer = document.getElementById('bookings-list');
      listContainer.innerHTML = '';

      const now = new Date();
      const filtered = allBookings.filter(b => {
          if (currentFilter === 'ALL') return true;
          const showTime = b.showDate && b.showTime ? new Date(`${b.showDate}T${b.showTime}`) : new Date(0);
          const isFuture = showTime > now;
          if (currentFilter === 'UPCOMING') return isFuture;
          if (currentFilter === 'COMPLETED') return !isFuture;
          return true;
      });

      if (filtered.length === 0) {
          listContainer.classList.add('hidden');
          document.getElementById('empty-state').classList.remove('hidden');
          document.getElementById('empty-state').querySelector('h3').innerText = currentFilter === 'ALL' ? 'No bookings found' : `No ${currentFilter.toLowerCase()} bookings`;
          return;
      }

      document.getElementById('empty-state').classList.add('hidden');
      listContainer.classList.remove('hidden');

      filtered.sort((a,b) => {
          const timeA = a.showDate && a.showTime ? new Date(`${a.showDate}T${a.showTime}`).getTime() : 0;
          const timeB = b.showDate && b.showTime ? new Date(`${b.showDate}T${b.showTime}`).getTime() : 0;
          return timeB - timeA; // Descending
      }).forEach(booking => {
          const showTime = booking.showDate && booking.showTime ? new Date(`${booking.showDate}T${booking.showTime}`) : new Date(0);
          const isFuture = showTime > now;
          const dateStr = showTime.getTime() > 0 ? 
              `${showTime.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'})} at ${booking.showTime}` 
              : 'Unknown Time';

          const badgeTitle = isFuture ? 'UPCOMING' : 'COMPLETED';
          const badgeStyle = isFuture ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-surface-variant text-outline border-outline-variant/20';

          const seatsStr = (booking.seatNumbers || []).join(', ') || 'N/A';

          const card = document.createElement('div');
          card.className = "relative flex flex-col md:flex-row bg-surface-container rounded-xl overflow-hidden group transition-all duration-300 hover:translate-y-[-4px] hover:bg-surface-bright border border-white/5 shadow-lg";

          card.innerHTML = `
              <div class="absolute left-0 top-0 bottom-0 w-1.5 ${isFuture ? 'bg-gradient-to-b from-primary to-secondary-container' : 'bg-outline-variant/30'}"></div>
              
              <div class="p-6 md:p-8 flex flex-col justify-between flex-grow pl-8">
                  <div class="flex justify-between items-start mb-4">
                      <div>
                          <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-[10px] font-black tracking-widest ${badgeStyle} mb-2 border">
                              ${badgeTitle}
                          </span>
                          <h2 class="font-headline text-2xl font-bold text-white mb-1">${booking.movieTitle || 'Unknown Title'}</h2>
                          <p class="text-outline text-sm">Booking ID: SC-${booking.bookingId || booking.id}</p>
                      </div>
                      <div class="text-right">
                          <span class="block font-headline text-2xl font-bold text-primary tracking-tighter">₹${booking.finalAmount || booking.totalAmount || 0}</span>
                      </div>
                  </div>
                  
                  <div class="grid grid-cols-2 md:grid-cols-3 gap-6 py-4 border-y border-outline-variant/10">
                      <div>
                          <span class="block text-[10px] uppercase tracking-tighter text-outline mb-1 font-bold">Date & Time</span>
                          <span class="block text-sm font-medium text-white">${dateStr}</span>
                      </div>
                      <div>
                          <span class="block text-[10px] uppercase tracking-tighter text-outline mb-1 font-bold">Seats</span>
                          <span class="block text-sm font-medium text-white">${seatsStr}</span>
                      </div>
                      <div class="col-span-2 md:col-span-1">
                          <span class="block text-[10px] uppercase tracking-tighter text-outline mb-1 font-bold">Cinema</span>
                          <span class="block text-sm font-medium text-white">${booking.theatreName || 'Unknown Theatre'} (${booking.cityName || ''})</span>
                      </div>
                  </div>

                  ${isFuture ? `
                  <div class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                      <div class="flex items-center gap-3 bg-primary/5 px-4 py-2 rounded-lg border border-primary/10">
                          <span class="material-symbols-outlined text-primary text-xl">event_available</span>
                          <span class="text-sm font-medium text-primary tracking-tight">Your show is coming up!</span>
                      </div>
                  </div>
                  ` : ''}
              </div>
          `;
          listContainer.appendChild(card);
      });
  }

</script>
</body>
</html>
