<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SimplyCinema - Movies & Cinemas</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container": "#201f1f",
            "background": "#131313",
            "outline": "#968e9e",
            "primary-fixed-dim": "#d6baff",
            "on-background": "#e5e2e1",
            "error": "#ffb4ab",
            "primary-container": "#6c3bb5",
            "on-surface-variant": "#ccc3d4",
            "surface-bright": "#3a3939",
            "on-primary": "#420089",
            "surface-tint": "#d6baff",
            "on-secondary": "#490080",
            "tertiary-fixed": "#e2e0fc",
            "surface-container-highest": "#353534",
            "inverse-primary": "#7343bc",
            "secondary-container": "#6f00be",
            "inverse-on-surface": "#313030",
            "on-error-container": "#ffdad6",
            "surface-dim": "#131313",
            "surface-container-lowest": "#0e0e0e",
            "tertiary": "#c6c4df",
            "tertiary-container": "#56556c",
            "surface": "#131313",
            "on-tertiary": "#2f2e43",
            "surface-variant": "#353534",
            "outline-variant": "#4a4452",
            "on-tertiary-container": "#cdcbe6",
            "on-primary-fixed-variant": "#5a26a3",
            "surface-container-low": "#1c1b1b",
            "on-surface": "#e5e2e1",
            "primary-fixed": "#ecdcff",
            "on-primary-container": "#dcc4ff",
            "error-container": "#93000a",
            "surface-container-high": "#2a2a2a",
            "on-primary-fixed": "#280057",
            "primary": "#d6baff",
            "secondary-fixed": "#f0dbff",
            "inverse-surface": "#e5e2e1",
            "secondary": "#ddb7ff",
            "on-secondary-container": "#d6a9ff"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .auteur-gradient { background: linear-gradient(135deg, #6C3BB5 0%, #1A1A2E 100%); }
    .glass-effect { background: rgba(53, 53, 52, 0.6); backdrop-filter: blur(20px); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .tab-active { border-bottom: 2px solid #d6baff; color: #d6baff; font-weight: bold; }
    .tab-inactive { color: #968e9e; }
  </style>

  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen">

<div id="navbar-placeholder"></div>

<main class="mt-16 pt-8 pb-20">
  <div class="max-w-screen-2xl mx-auto px-8">
    <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
      <div>
        <h2 class="font-headline text-4xl font-bold text-white tracking-tight" id="page-title">Movies in your City</h2>
        <p class="text-outline text-sm mt-2" id="page-subtitle">Browse all current and upcoming shows.</p>
      </div>
      <!-- Tabs -->
      <div class="flex items-center gap-8 bg-surface-container-lowest p-1 rounded-full border border-white/5">
        <button id="tab-movies" class="px-6 py-2 rounded-full font-medium transition-all bg-primary-container text-on-primary-container shadow-[0_0_15px_rgba(108,59,181,0.4)]">Movies</button>
        <button id="tab-cinemas" class="px-6 py-2 rounded-full font-medium text-on-surface-variant hover:text-white transition-colors">Cinemas</button>
      </div>
    </div>

    <!-- Data Containers -->
    <div id="movies-view" class="space-y-12">
      <!-- Filters (Movies) -->
      <div id="genre-filters" class="flex items-center gap-3 overflow-x-auto hide-scrollbar border-b border-surface-container-highest pb-6">
        <button class="genre-btn px-5 py-2 bg-primary-container text-on-primary-container rounded-full text-sm font-medium whitespace-nowrap" data-genre-id="all">All Genres</button>
        <!-- Populated via JS -->
      </div>

      <!-- Now Showing Section -->
      <div id="now-showing-section">
          <div class="flex items-center justify-between mb-6">
              <h3 class="font-headline text-2xl font-bold text-white">Now Showing</h3>
              <a href="#" class="text-primary text-sm font-medium hover:underline">View All</a>
          </div>
          <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-4 min-h-[300px]">
              <!-- Populated via JS -->
          </div>
      </div>

      <!-- Upcoming Movies Section -->
      <div id="upcoming-section">
        <div class="flex items-center justify-between mb-6">
            <h3 class="font-headline text-2xl font-bold text-white">Coming Soon</h3>
            <a href="#" class="text-primary text-sm font-medium hover:underline">View All</a>
        </div>
        <div id="upcoming-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-4 min-h-[200px]">
            <!-- Populated via JS -->
        </div>
      </div>
    </div>

    <div id="cinemas-view" class="hidden space-y-6">
      <div id="cinemas-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[400px]">
        <!-- Populated via JS -->
      </div>
    </div>

  </div>
</main>

<div id="footer-placeholder"></div>

<script>
  injectComponent("#navbar-placeholder", "../../components/navbar.html");
  injectComponent("#footer-placeholder", "../../components/footer.html");

  window.addEventListener('cityChanged', (e) => {
    console.log('City changed detected in home.html:', e.detail);
    loadMovies();
    if (currentMainTab === 'cinemas') loadCinemas();
  });

  const tabMovies = document.getElementById('tab-movies');
  const tabCinemas = document.getElementById('tab-cinemas');
  const viewMovies = document.getElementById('movies-view');
  const viewCinemas = document.getElementById('cinemas-view');
  const pageTitle = document.getElementById('page-title');
  const pageSubtitle = document.getElementById('page-subtitle');
  const moviesGrid = document.getElementById('movies-grid');
  const upcomingGrid = document.getElementById('upcoming-grid');
  const cinemasGrid = document.getElementById('cinemas-grid');
  const genreFilters = document.getElementById('genre-filters');

  let currentMainTab = 'movies';
  let activeGenreId = 'all';

  const switchTab = (tab) => {
    currentMainTab = tab;
    if (tab === 'movies') {
      tabMovies.className = 'px-6 py-2 rounded-full font-medium transition-all bg-primary-container text-on-primary-container shadow-[0_0_15px_rgba(108,59,181,0.4)]';
      tabCinemas.className = 'px-6 py-2 rounded-full font-medium text-on-surface-variant hover:text-white transition-colors';
      viewMovies.classList.remove('hidden');
      viewCinemas.classList.add('hidden');
      pageTitle.innerText = "Movies in your City";
      pageSubtitle.innerText = "Browse all current and upcoming shows.";
      loadGenres();
      loadMovies();
    } else {
      tabCinemas.className = 'px-6 py-2 rounded-full font-medium transition-all bg-primary-container text-on-primary-container shadow-[0_0_15px_rgba(108,59,181,0.4)]';
      tabMovies.className = 'px-6 py-2 rounded-full font-medium text-on-surface-variant hover:text-white transition-colors';
      viewCinemas.classList.remove('hidden');
      viewMovies.classList.add('hidden');
      pageTitle.innerText = "Cinemas Near You";
      pageSubtitle.innerText = "Find theatres and check their showtimes.";
      loadCinemas();
    }
  };

  tabMovies.addEventListener('click', () => switchTab('movies'));
  tabCinemas.addEventListener('click', () => switchTab('cinemas'));

  async function loadGenres() {
    try {
        const genres = await Genres.getAll();
        const allBtn = `<button class="genre-btn px-5 py-2 ${activeGenreId === 'all' ? 'bg-primary-container text-on-primary-container shadow-[0_0_15px_rgba(108,59,181,0.4)]' : 'bg-surface-container-high text-on-surface-variant hover:text-white'} rounded-full text-sm font-medium whitespace-nowrap" data-genre-id="all">All Genres</button>`;
        genreFilters.innerHTML = allBtn + genres.map(g => `
          <button class="genre-btn px-5 py-2 ${activeGenreId == g.id ? 'bg-primary-container text-on-primary-container shadow-[0_0_15px_rgba(108,59,181,0.4)]' : 'bg-surface-container-high text-on-surface-variant hover:text-white'} rounded-full text-sm font-medium transition-colors whitespace-nowrap" data-genre-id="${g.id}">${g.name}</button>
        `).join('');

        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.onclick = () => {
                activeGenreId = btn.getAttribute('data-genre-id');
                loadGenres(); 
                loadMovies();
            };
        });
    } catch(e) {}
  }

  async function loadMovies() {
    let cityId = null;
    try {
        const savedCity = JSON.parse(localStorage.getItem('sc_city'));
        if (savedCity) cityId = savedCity.cityId;
    } catch(e) {}

    moviesGrid.innerHTML = '<div class="col-span-full text-white flex items-center gap-2"><div class="full-screen-loader" style="position:static;width:24px;height:24px;"></div> Loading movies...</div>';
    upcomingGrid.innerHTML = '<div class="text-white flex items-center gap-2 py-10 px-4"><div class="full-screen-loader" style="position:static;width:24px;height:24px;"></div> Loading...</div>';

    try {
      let showingMovies = [];
      let upcomingMovies = [];

      if (activeGenreId === 'all') {
          showingMovies = await Movies.getNowShowing(cityId);
          upcomingMovies = await Movies.getUpcoming();
      } else {
          const genreMovies = await Movies.getByGenre(activeGenreId);
          const today = new Date();
          showingMovies = genreMovies.filter(m => !m.releaseDate || new Date(m.releaseDate) <= today);
          upcomingMovies = genreMovies.filter(m => m.releaseDate && new Date(m.releaseDate) > today);
      }

      renderMovieGrid(showingMovies, moviesGrid);
      renderMovieGrid(upcomingMovies, upcomingGrid, true);

      if (showingMovies.length === 0) {
        moviesGrid.innerHTML = '<div class="col-span-full text-outline text-center py-10">No movies found.</div>';
      }
      if (upcomingMovies.length === 0) {
        upcomingGrid.innerHTML = '<div class="col-span-full text-outline text-center py-10">No upcoming releases.</div>';
      }
    } catch(err) {
      moviesGrid.innerHTML = '<div class="col-span-full text-error text-center py-20">Failed to load movies.</div>';
    }
  }

  function renderMovieGrid(movies, container, isUpcoming = false) {
    container.innerHTML = '';
    movies.forEach(movie => {
        const posterUrl = movie.posterUrl && movie.posterUrl !== 'null' ? movie.posterUrl : 'https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1000&auto=format&fit=crop';
        
        const div = document.createElement('div');
        div.className = 'group cursor-pointer';
        div.innerHTML = `
          <a href="movie-details?id=${movie.id}" class="block" onclick="saveBookingToSession('${movie.id}', '${movie.title.replace(/'/g, "\\'")}', '${posterUrl}')">
            <div class="relative group aspect-[2/3] rounded-xl overflow-hidden bg-surface-container-highest border border-white/5 transition-all duration-500 hover:scale-[1.03] hover:shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
            <div id="poster-fallback-home-${movie.id}" class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-surface-container-low to-surface-container-highest text-outline/20">
                <span class="material-symbols-outlined text-[32px]">movie</span>
            </div>
            <img src="${posterUrl}" 
                 onload="document.getElementById('poster-fallback-home-${movie.id}').style.display='none'"
                 onerror="this.style.display='none'; document.getElementById('poster-fallback-home-${movie.id}').style.display='flex'" 
                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 relative z-10">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80 transition-opacity group-hover:opacity-100 z-20"></div>
            <div class="absolute top-2 left-2 z-30">
                <span class="px-1.5 py-0.5 rounded bg-black/60 backdrop-blur-md border border-white/10 text-[8px] font-black text-primary uppercase tracking-tighter">${movie.rating || 'UA'}</span>
            </div>
            ${isUpcoming ? `<div class="absolute top-2 right-2 z-30"><span class="px-2 py-0.5 rounded-full bg-primary-container/90 backdrop-blur-md text-[7px] font-black text-on-primary-container uppercase tracking-wider">Coming Soon</span></div>` : ''}
            <div class="absolute bottom-0 left-0 w-full p-3 transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300 z-30">
                <h4 class="font-bold text-white text-xs leading-tight mb-1 drop-shadow-2xl line-clamp-2">${movie.title}</h4>
                <div class="flex items-center justify-between text-[7px] font-black text-outline uppercase tracking-[0.1em]">
                    <span>${movie.durationMinutes || 0}m</span>
                    <div class="flex items-center gap-0.5 text-secondary">
                        <span class="material-symbols-outlined text-[10px]" style="font-variation-settings: 'FILL' 1">star</span>
                        <span class="text-white">${movie.averageRating ? movie.averageRating.toFixed(1) : '0.0'}</span>
                    </div>
                </div>
            </div>
          </a>
        `;
        container.appendChild(div);
    });
  }

  function saveBookingToSession(id, title, posterUrl) {
      sessionStorage.setItem('sc_booking', JSON.stringify({ movieId: id, title, posterUrl }));
  }

  async function loadCinemas() {
    let cityId = null;
    try {
      const savedCity = JSON.parse(localStorage.getItem('sc_city'));
      if (savedCity) cityId = savedCity.cityId;
    } catch(e){}

    cinemasGrid.innerHTML = '<div class="col-span-full text-white flex items-center gap-2"><div class="full-screen-loader" style="position:static;width:24px;height:24px;"></div> Loading cinemas...</div>';
    
    if (!cityId) {
      cinemasGrid.innerHTML = '<div class="col-span-full text-outline text-center py-20">Please select a city to see local cinemas.</div>';
      return;
    }

    try {
      const theatres = await Theatres.getByCity(cityId);
      if (!theatres || theatres.length === 0) {
        cinemasGrid.innerHTML = '<div class="col-span-full text-outline text-center py-20">No cinemas found.</div>';
        return;
      }
      
      cinemasGrid.innerHTML = '';
      theatres.forEach(t => {
        const div = document.createElement('div');
        div.className = 'bg-surface-container-high rounded-xl p-5 border border-white/5 hover:border-primary/30 transition-all group cursor-pointer hover:shadow-[0_0_20px_rgba(108,59,181,0.2)]';
        div.onclick = () => {
          sessionStorage.setItem('sc_theatre', JSON.stringify(t));
          // window.location.href = `/pages/customer/cinema-details.html?id=${t.id}`;
        };
        
        div.innerHTML = `
          <div class="flex items-start justify-between mb-4">
            <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-surface-container-lowest text-primary">
              <span class="material-symbols-outlined text-xl">theaters</span>
            </div>
          </div>
          <h4 class="font-bold text-white text-lg mb-1 group-hover:text-primary transition-colors">${t.name}</h4>
          <p class="text-on-surface-variant text-xs flex items-start gap-1">
            <span class="material-symbols-outlined text-[14px]">location_on</span>
            <span class="line-clamp-1">${t.address || 'Delhi NCR'}</span>
          </p>
        `;
        cinemasGrid.appendChild(div);
      });
    } catch(err) {
      cinemasGrid.innerHTML = '<div class="col-span-full text-error text-center py-20">Failed to load cinemas.</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    switchTab('movies');
  });

  window.addEventListener('cityChanged', () => {
    if(currentMainTab === 'movies') loadMovies();
    else loadCinemas();
  });
</script>
</body>
</html>
