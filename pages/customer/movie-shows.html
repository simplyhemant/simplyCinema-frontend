<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SimplyCinema - Choose Showtime</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container": "#201f1f",
            "background": "#131313",
            "outline": "#968e9e",
            "primary": "#d6baff",
            "primary-container": "#6c3bb5",
            "on-surface-variant": "#ccc3d4",
            "surface-variant": "#353534",
            "surface-container-low": "#1c1b1b",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "on-background": "#e5e2e1",
            "error": "#ffb4ab",
            "warning": "#f97316"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass { background: rgba(32, 31, 31, 0.7); backdrop-filter: blur(20px); }
    .sticky-bar { position: sticky; top: 64px; z-index: 40; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>

  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col pt-16">

<div id="navbar-placeholder"></div>

<!-- Hero Context Section (Non-sticky) -->
<section class="relative h-[220px] w-full overflow-hidden shrink-0">
    <div id="hero-bg" class="absolute inset-0 bg-cover bg-center opacity-30 blur-md scale-105" style="background-image: url('https://via.placeholder.com/1920x1080?text=Backdrop')"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-background/0 via-background/60 to-background"></div>
    
    <div class="absolute inset-0 flex items-center max-w-7xl mx-auto px-8 gap-8">
        <div class="w-[100px] aspect-[2/3] rounded-2xl overflow-hidden shadow-2xl border border-white/10 shrink-0">
            <img id="m-poster" class="w-full h-full object-cover" src="https://via.placeholder.com/120x180" alt="Poster">
        </div>
        <div class="space-y-2">
            <div class="flex items-center gap-3">
               <span id="m-rating" class="px-2 py-0.5 border border-white/20 rounded text-[9px] font-black tracking-widest bg-white/5 backdrop-blur-sm transition-all uppercase">UA</span>
               <div id="m-genres" class="flex gap-2"></div>
            </div>
            <h1 id="m-title" class="text-3xl md:text-5xl font-black font-headline tracking-tighter text-white drop-shadow-2xl">Loading...</h1>
            <div class="flex items-center gap-4 text-xs font-bold text-white/50 tracking-wide uppercase">
                <span id="m-duration">--m</span>
                <span id="m-release-year">----</span>
            </div>
        </div>
    </div>
</section>

<!-- Sticky Date & Filter Bar -->
<section class="sticky-bar glass border-y border-white/5">
    <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row items-center justify-between gap-6 py-4">
        <!-- Date Selector -->
        <div id="date-selector-container" class="flex gap-3 overflow-x-auto hide-scrollbar snap-x w-full md:w-auto">
            <!-- Populated via JS -->
        </div>
        
        <!-- Filters (Language & Format) -->
        <div class="flex flex-wrap items-center gap-4 w-full md:w-auto overflow-x-auto hide-scrollbar shrink-0">
             <div id="lang-chips" class="flex gap-2 border-r border-white/10 pr-4"></div>
             <div id="fmt-chips" class="flex gap-2"></div>
        </div>
    </div>
</section>

<main class="flex-1 w-full max-w-7xl mx-auto px-8 py-10">
    <!-- Summary Info -->
    <div class="flex items-center justify-between mb-8 opacity-60">
        <p class="text-xs font-bold uppercase tracking-widest flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">location_on</span>
            Showing for <span id="m-city-name" class="text-primary">your selected city</span>
        </p>
        <div class="flex items-center gap-6 text-[10px] font-black uppercase tracking-widest">
            <div class="flex items-center gap-2 text-green-500">
                <div class="w-2 h-2 rounded-full bg-current"></div> Available
            </div>
            <div class="flex items-center gap-2 text-warning">
                <div class="w-2 h-2 rounded-full bg-current"></div> Filling Fast
            </div>
        </div>
    </div>

    <!-- Theatres List -->
    <div id="theatres-container" class="space-y-4">
        <div class="p-20 text-center text-outline/40">
            <div class="w-8 h-8 border-2 border-primary/20 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
            Finding cinemas playing this movie...
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script>
    injectComponent("#navbar-placeholder", "../../components/navbar.html");
    injectComponent("#footer-placeholder", "../../components/footer.html");

    const urlParams = new URLSearchParams(window.location.search);
    let movieId = urlParams.get('movieId');
    let activeLangId = urlParams.get('langId');
    let activeFormatId = urlParams.get('formatId');
    let cityId = null;
    let selectedDate = formatLocalDate(new Date());

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        if (!movieId) {
            const bookingData = JSON.parse(sessionStorage.getItem('sc_booking') || '{}');
            movieId = bookingData.movieId;
        }
        if (!movieId) { window.location.href = 'home'; return; }

        try {
            const savedCity = JSON.parse(localStorage.getItem('sc_city'));
            if(savedCity) {
                cityId = savedCity.cityId;
                document.getElementById('m-city-name').innerText = savedCity.cityName;
            }
        } catch(e) { }

        await loadMovieDetails();
        generateDateSelector();
        await loadShowsAndTheatres();
    });

    window.addEventListener('cityChanged', (e) => {
        if(e.detail) {
            cityId = e.detail.cityId;
            document.getElementById('m-city-name').innerText = e.detail.cityName;
        }
        loadShowsAndTheatres();
    });

    async function loadMovieDetails() {
        try {
            const movie = await Movies.getById(movieId);
            if(!movie) return;

            document.title = `${movie.title} Showtimes - SimplyCinema`;
            document.getElementById('m-title').innerText = movie.title;
            document.getElementById('m-duration').innerText = `${movie.durationMinutes || '--'} min`;
            document.getElementById('m-release-year').innerText = movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBA';
            
            const posterUrl = movie.posterUrl && movie.posterUrl !== 'null' ? movie.posterUrl : 'https://via.placeholder.com/120x180';
            document.getElementById('m-poster').src = posterUrl;
            document.getElementById('hero-bg').style.backgroundImage = `url('${movie.bannerUrl && movie.bannerUrl !== 'null' ? movie.bannerUrl : posterUrl}')`;

            if (movie.genres) {
                document.getElementById('m-genres').innerHTML = movie.genres.map(g => 
                    `<span class="text-[8px] font-black px-2 py-0.5 bg-white/5 rounded border border-white/10 uppercase tracking-tighter text-white/60">${g}</span>`
                ).join('');
            }

            // Fetch filter options for this movie/city
            try {
                const filters = await Shows.getAvailableFilters(movieId, cityId);
                renderFilterChips(filters.languages, filters.formats);
            } catch(e){}
        } catch(e) { console.error('Details load failed:', e); }
    }

    function generateDateSelector() {
        const container = document.getElementById('date-selector-container');
        container.innerHTML = '';
        const today = new Date();
        
        for(let i=0; i<7; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            const dateStr = formatLocalDate(date);
            
            const dayName = i === 0 ? 'TODAY' : date.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
            const dayNum = date.getDate();
            const monthName = date.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();

            const btn = document.createElement('button');
            const isActive = selectedDate === dateStr;
            btn.className = `min-w-[70px] snap-center flex flex-col items-center justify-center py-3 rounded-2xl transition-all duration-300 border ${isActive ? 'bg-primary text-black border-primary shadow-[0_10px_30px_rgba(214,186,255,0.3)] scale-105' : 'bg-white/5 border-white/5 text-white/40 hover:border-white/20 hover:text-white'}`;
            btn.innerHTML = `
                <span class="text-[8px] font-black tracking-widest opacity-60">${dayName}</span>
                <span class="text-xl font-headline font-black leading-none my-1">${dayNum}</span>
                <span class="text-[8px] font-black tracking-widest opacity-60">${monthName}</span>
            `;

            btn.onclick = () => {
                selectedDate = dateStr;
                generateDateSelector();
                loadShowsAndTheatres();
            };
            container.appendChild(btn);
        }
    }

    function renderFilterChips(movieLangs, movieFmts) {
        const langContainer = document.getElementById('lang-chips');
        const fmtContainer = document.getElementById('fmt-chips');
        
        const renderItems = (container, items, activeId, type) => {
            if(!items) return;
            container.innerHTML = items.map(item => {
                const isActive = activeId == item.id;
                return `
                <button onclick="toggleFilter('${type}', ${item.id})" 
                        class="px-4 py-2 rounded-full border text-[9px] font-black uppercase tracking-widest transition-all
                        ${isActive ? 'bg-primary-container text-white border-primary shadow-lg' : 'bg-white/5 text-white/40 border-white/10 hover:border-white/20'}">
                    ${item.name}
                </button>`;
            }).join('');
        };

        renderItems(langContainer, movieLangs, activeLangId, 'lang');
        renderItems(fmtContainer, movieFmts, activeFormatId, 'fmt');
    }

    async function toggleFilter(type, id) {
        if (type === 'lang') activeLangId = activeLangId == id ? null : id;
        else activeFormatId = activeFormatId == id ? null : id;
        
        // Refresh filter chips to show selection
        try {
            const filters = await Shows.getAvailableFilters(movieId, cityId);
            renderFilterChips(filters.languages, filters.formats);
        } catch(e){}
        
        loadShowsAndTheatres();
    }

    async function loadShowsAndTheatres() {
        const container = document.getElementById('theatres-container');
        container.innerHTML = '<div class="p-20 text-center text-outline/40 animate-pulse">Updating showtimes...</div>';
        
        try {
            const shows = await Shows.getByMovie(movieId, activeLangId, activeFormatId, cityId, selectedDate);
            
            if(!shows || shows.length === 0) {
                container.innerHTML = `
                    <div class="p-20 text-center space-y-4 bg-surface-container-low rounded-3xl border border-white/5 animate-in">
                        <span class="material-symbols-outlined text-6xl text-outline/10">movie_off</span>
                        <div>
                            <p class="text-xl font-headline font-bold text-white">No shows available</p>
                            <p class="text-xs text-outline font-medium">Try another date or broaden your filters.</p>
                        </div>
                    </div>`;
                return;
            }

            // Grouping: Theatre -> Shows
            const theatreMap = {};
            shows.forEach(show => {
                const tid = show.theatreId;
                if(!theatreMap[tid]) {
                    theatreMap[tid] = {
                        name: show.theatreName,
                        address: show.theatreAddress,
                        shows: []
                    };
                }
                theatreMap[tid].shows.push(show);
            });

            container.innerHTML = Object.keys(theatreMap).map(tid => {
                const theatre = theatreMap[tid];
                // Sort shows by time
                theatre.shows.sort((a,b) => a.showTime.localeCompare(b.showTime));

                return `
                <div class="bg-surface-container-low rounded-3xl border border-white/5 overflow-hidden transition-all hover:border-white/10 group animate-in shadow-xl">
                    <div class="flex flex-col md:flex-row min-h-[140px]">
                        <!-- Left: Theatre Info -->
                        <div class="md:w-1/3 p-8 border-b md:border-b-0 md:border-r border-white/5 bg-surface-container-high/20">
                            <h3 class="text-xl font-headline font-black text-white leading-tight mb-2 group-hover:text-primary transition-colors">${theatre.name}</h3>
                            <p class="text-[10px] text-outline font-bold uppercase tracking-widest flex items-start gap-2">
                                <span class="material-symbols-outlined text-[14px] shrink-0">location_on</span>
                                ${theatre.address || 'Address not available'}
                            </p>
                            <div class="mt-4 flex gap-2">
                                <span class="px-2 py-0.5 bg-green-500/10 text-green-500 text-[8px] font-black rounded uppercase tracking-tighter border border-green-500/20">Cancellation available</span>
                            </div>
                        </div>
                        
                        <!-- Right: Timing Chips -->
                        <div class="flex-1 p-8">
                            <div class="flex flex-wrap gap-4">
                                ${theatre.shows.map(show => {
                                    const timeStr = show.showTime.substring(0, 5);
                                    const h = parseInt(show.showTime.split(':')[0]);
                                    const isAm = h < 12;
                                    const displayTime = h > 12 ? (h-12).toString().padStart(2,'0') + show.showTime.substring(2,5) : (h === 0 ? '12' : h.toString().padStart(2,'0')) + show.showTime.substring(2,5);
                                    
                                    const occupancy = (show.totalSeats - show.availableSeats) / show.totalSeats;
                                    const isFillingFast = occupancy > 0.8;
                                    const statusClass = isFillingFast ? 'text-warning border-warning/30 bg-warning/5' : 'text-green-500 border-green-500/30 bg-green-500/5';
                                    
                                    // Base price from DTO
                                    const price = show.minPrice ? '₹' + show.minPrice : 'N/A';

                                    return `
                                    <button onclick="bookShow(${show.id})" class="group/chip relative flex flex-col items-center justify-center min-w-[120px] p-4 rounded-2xl border ${statusClass} transition-all hover:scale-105 active:scale-95 hover:shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:bg-surface-container-highest">
                                        <div class="text-lg font-headline font-black text-white group-hover/chip:text-primary transition-colors">
                                            ${displayTime} <span class="text-[8px] opacity-40 uppercase">${isAm ? 'AM' : 'PM'}</span>
                                        </div>
                                        <div class="text-[8px] font-black uppercase tracking-widest mt-1 opacity-70">
                                            ${show.formatName || '2D'} • ${show.languageName || ''}
                                        </div>
                                        <div class="mt-2 text-[9px] font-bold opacity-0 group-hover/chip:opacity-100 transition-opacity">
                                            From ${price}
                                        </div>
                                        ${isFillingFast ? '<div class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-warning shadow-[0_0_10px_#f97316]"></div>' : ''}
                                    </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        } catch(err) {
            console.error('Fetch shows failed:', err);
            container.innerHTML = '<div class="p-10 text-center text-error bg-error/10 border border-error/20 rounded-3xl">Failed to load showtimes. Server might be down.</div>';
        }
    }

    function bookShow(showId) {
        const isSubdir = window.location.pathname.includes('/simplyCinema-frontend/');
        const basePath = isSubdir ? '/simplyCinema-frontend/pages/customer/seat-selection' : '/pages/customer/seat-selection';
        window.location.href = `${basePath}?showId=${showId}`;
    }
</script>
</body>
</html>
>
