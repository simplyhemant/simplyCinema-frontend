<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Counter Booking | SimplyCinema</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container": "#201f1f", "background": "#131313", "outline": "#968e9e", "primary-container": "#6c3bb5", "surface-container-highest": "#353534", "surface-container-low": "#1c1b1b", "primary": "#d6baff" }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] } } } }
  </script>
  <style>
    :root { color-scheme: dark; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Premium Seat Styles */
    .seat-checkbox:checked + .seat-box { 
      background-color: #d6baff; 
      border-color: #d6baff; 
      color: #420089;
      box-shadow: 0 0 15px rgba(214, 186, 255, 0.6);
      transform: scale(1.05);
    }
    .seat-box {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .curved-screen-effect {
      box-shadow: 0 -15px 40px -10px rgba(108, 59, 181, 0.4);
      transform: rotateX(-10deg);
    }
    .glass-panel {
      background: rgba(32, 31, 31, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    /* Fix native dropdown for dark theme */
    select option {
      background-color: #131313;
      color: white;
    }
  </style>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-[#0d0d0d] text-white font-body selection:bg-primary/30">

<div id="staff-sidebar-placeholder"></div>
<div id="admin-topbar-placeholder"></div>

<main class="pl-64 pt-20 min-h-screen">
  <div class="p-8 space-y-8 max-w-[1400px] mx-auto">
    
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="font-headline text-4xl font-black tracking-tight text-white mb-2 uppercase">Ticket Console</h1>
        <p class="text-outline text-sm font-medium tracking-wide opacity-60">Box office terminal • <span id="currentDateDisplay">Today</span></p>
      </div>
      <div id="staff-badge" class="px-4 py-2 bg-primary/10 border border-primary/20 rounded-full flex items-center gap-2">
         <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
         <span class="text-[10px] uppercase font-black tracking-widest text-primary" id="staff-name-display">Counter Active</span>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
      
      <!-- Left: Show & Seat Selection (3/4 width) -->
      <div class="xl:col-span-3 space-y-8">
        
        <!-- Step 1: Configuration -->
        <div class="glass-panel rounded-3xl p-8 space-y-8 shadow-2xl">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary shadow-[0_0_20px_rgba(108,59,181,0.2)]">
                <span class="material-symbols-outlined">movie_filter</span>
            </div>
            <h2 class="text-2xl font-black font-headline tracking-tighter">1. Configuration</h2>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="space-y-3">
              <label class="text-[10px] uppercase font-black tracking-[0.2em] text-outline opacity-80 pl-1">Select Movie</label>
              <div class="relative group">
                  <select id="movieSelect" onchange="loadDates()" class="w-full bg-background border border-white/5 rounded-2xl px-5 py-4 text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all appearance-none cursor-pointer hover:bg-white/[0.02]">
                    <option value="">Search movies...</option>
                  </select>
                  <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline pointer-events-none opacity-50">expand_more</span>
              </div>
            </div>
            <div class="space-y-3">
              <label class="text-[10px] uppercase font-black tracking-[0.2em] text-outline opacity-80 pl-1">Select Date</label>
              <div class="relative group">
                  <select id="dateSelect" onchange="loadShowsByDate()" disabled class="w-full bg-background border border-white/5 rounded-2xl px-5 py-4 text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all appearance-none cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed hover:bg-white/[0.02]">
                    <option value="">First select a movie</option>
                  </select>
                  <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline pointer-events-none opacity-50">calendar_today</span>
              </div>
            </div>
            <div class="space-y-3">
              <label class="text-[10px] uppercase font-black tracking-[0.2em] text-outline opacity-80 pl-1">Select Show</label>
              <div class="relative group">
                  <select id="showSelect" onchange="loadSeats()" disabled class="w-full bg-background border border-white/5 rounded-2xl px-5 py-4 text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all appearance-none cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed hover:bg-white/[0.02]">
                    <option value="">First select a date</option>
                  </select>
                  <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline pointer-events-none opacity-50">schedule</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Step 2: Seating -->
        <div class="glass-panel rounded-3xl p-8 space-y-8 shadow-2xl">
           <div class="flex justify-between items-center">
             <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary shadow-[0_0_20px_rgba(108,59,181,0.2)]">
                    <span class="material-symbols-outlined">event_seat</span>
                </div>
                <h2 class="text-2xl font-black font-headline tracking-tighter">2. Seating Map</h2>
             </div>
             <div class="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                <span class="text-[10px] uppercase font-black tracking-widest text-outline">Selected</span>
                <span id="seatCount" class="text-xl font-black text-primary font-headline min-w-[20px] text-center">0</span>
             </div>
           </div>
           
           <!-- This is the container we overhauling -->
           <div id="seatMapContainer" class="min-h-[500px] flex flex-col items-center justify-center border border-white/5 rounded-2xl bg-background p-12 transition-all duration-500 overflow-hidden relative">
              <div class="flex flex-col items-center gap-6 opacity-30 text-center">
                  <span class="material-symbols-outlined text-6xl">grid_view</span>
                  <p class="text-sm font-medium max-w-[200px]">Select a show to visualize the auditorium</p>
              </div>
           </div>
        </div>

      </div>

      <!-- Right: Checkout (1/4 width) -->
      <div class="space-y-8">
        <div class="glass-panel rounded-3xl p-8 shadow-2xl sticky top-24 border-t-2 border-t-primary/20">
          <div class="flex items-center gap-3 mb-8">
              <span class="material-symbols-outlined text-primary">person_add</span>
              <h2 class="text-xl font-bold font-headline tracking-tight uppercase">Checkout</h2>
          </div>
          
          <form id="bookingForm" class="space-y-6" onsubmit="handleBooking(event)">
            <div class="space-y-4">
                <div class="space-y-2 group">
                  <label class="text-[9px] uppercase font-black tracking-widest text-outline pl-1 opacity-70">Customer Name <span class="opacity-50 font-medium">(Optional)</span></label>
                  <input type="text" id="custName" placeholder="Walk-in Guest" class="w-full bg-background border border-white/5 rounded-xl px-4 py-3 text-white focus:border-primary outline-none transition-all placeholder:opacity-30">
                </div>
                <div class="space-y-2 group">
                  <label class="text-[9px] uppercase font-black tracking-widest text-outline pl-1 opacity-70">Phone Number <span class="opacity-50 font-medium">(Optional)</span></label>
                  <input type="text" id="custPhone" placeholder="Mobile Number" class="w-full bg-background border border-white/5 rounded-xl px-4 py-3 text-white focus:border-primary outline-none transition-all placeholder:opacity-30">
                </div>
                <div class="space-y-2">
                  <label class="text-[9px] uppercase font-black tracking-widest text-outline pl-1 opacity-70">Payment Method</label>
                  <select id="paymentMode" required class="w-full bg-background border border-white/5 rounded-xl px-4 py-3 text-white focus:border-primary outline-none transition-all">
                    <option value="CASH">Cash Payment</option>
                    <option value="CARD_MACHINE">Card / POS</option>
                    <option value="UPI">UPI (GooglePay/PhonePe)</option>
                  </select>
                </div>
            </div>

            <div class="pt-8 mt-4 border-t border-white/5 space-y-6">
              <div class="flex justify-between items-end">
                <span class="text-[10px] uppercase font-black tracking-widest text-outline pb-1">Grand Total</span>
                <span class="text-4xl font-headline font-black text-primary tracking-tighter" id="totalPrice">₹0</span>
              </div>
              
              <button type="submit" id="bookBtn" disabled class="w-full py-5 bg-primary text-[#420089] font-black rounded-2xl hover:bg-[#ffe0ff] hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-20 disabled:grayscale disabled:cursor-not-allowed shadow-[0_10px_30px_rgba(108,59,181,0.3)] text-base uppercase tracking-widest flex justify-center items-center gap-3">
                <span class="material-symbols-outlined font-black">print</span> Print Ticket
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  injectComponent("#staff-sidebar-placeholder", "../../components/staff-sidebar.html");
  injectComponent("#admin-topbar-placeholder", "../../components/admin-topbar.html");

  let allMovies = [];
  let allMovieShows = [];
  let currentShows = [];
  let currentSeatsData = [];
  let selectedSeatIds = new Set();
  
  let myTheatreId = null;
  let myTheatreName = "";

  document.addEventListener('DOMContentLoaded', async () => {
      // STRICT ROLE ACCESS CONTROL per user request
      requireAuth(['THEATRE_STAFF']);
      
      // Update Date Display
      const dateEl = document.getElementById('currentDateDisplay');
      if(dateEl) {
          dateEl.innerText = new Date().toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric'});
      }

      const user = JSON.parse(localStorage.getItem('sc_user') || "{}");
      
      try {
          const profile = await CounterStaff.getMyProfile();
          if(profile && profile.theatreId) {
             myTheatreId = profile.theatreId;
             myTheatreName = profile.theatreName || "Theatre";
             document.getElementById('staff-name-display').innerText = `${user.firstName || 'Staff'} • ${myTheatreName} Terminal`;
          } else {
             // Redundant fallback, as this page rejects non-THEATRE_STAFF, but just in case
             document.getElementById('staff-name-display').innerText = `${user.firstName || 'Admin'} • Restricted Console`;
          }
      } catch (e) {
          console.warn("Could not fetch staff profile.");
          document.getElementById('staff-name-display').innerText = `Unauthorized Console`;
      }

      await fetchMoviesForTheatre();
  });

  async function fetchMoviesForTheatre() {
      try {
          if(myTheatreId) {
              // ShowDto returns: { id, movieId, screenId, showDate, showTime, ... }
              // There's no nested movie object - just a flat movieId field
              const theatreShows = await Shows.getByTheatre(myTheatreId);
              if (!theatreShows || theatreShows.length === 0) {
                  console.warn("No shows found for theatre ID:", myTheatreId);
                  allMovies = [];
              } else {
                  // Collect unique movieIds from shows
                  const uniqueMovieIds = [...new Set(theatreShows.map(s => s.movieId).filter(Boolean))];
                  // Fetch full movie detail for each unique movieId in parallel
                  const movieResults = await Promise.all(uniqueMovieIds.map(id => Movies.getById(id)));
                  allMovies = movieResults.filter(Boolean); // remove nulls on error
              }
          } else {
              allMovies = [];
          }
          
          const select = document.getElementById('movieSelect');
          select.innerHTML = '<option value="">Search movies...</option>';
          if (allMovies.length === 0) {
              select.innerHTML = '<option value="">No movies scheduled</option>';
              return;
          }
          allMovies.forEach(m => {
              const duration = m.durationMinutes || m.duration || 'N/A';
              select.innerHTML += `<option value="${m.id}">${m.title} [${duration}m]</option>`;
          });
      } catch (e) {
          console.error("Movie fetch failed", e);
      }
  }

  async function loadDates() {
      const movieId = document.getElementById('movieSelect').value;
      const dateSelect = document.getElementById('dateSelect');
      const showSelect = document.getElementById('showSelect');
      
      dateSelect.innerHTML = '<option value="">Loading dates...</option>';
      dateSelect.disabled = true;
      showSelect.innerHTML = '<option value="">First select a date</option>';
      showSelect.disabled = true;
      resetSelection();
      
      if(!movieId) {
          dateSelect.innerHTML = '<option value="">First select a movie</option>';
          return;
      }

      try {
          let shows = await Shows.getByMovie(movieId);
          if (myTheatreId) {
              // ShowDto has flat theatreId, not nested theatre object
              shows = shows.filter(s => s.screenId != null); // ensure valid show
              // We need to get shows only for this theatre - use the theatres shows we already know
              // Filter by checking if this show belongs to our theatre's screens
              // Best approach: re-use getByTheatre filtered by movieId
              const theatreShows = await Shows.getByTheatre(myTheatreId);
              shows = theatreShows.filter(s => s.movieId == movieId);
          }
          allMovieShows = shows;
          
          if(allMovieShows.length === 0) {
              dateSelect.innerHTML = '<option value="">No active dates found</option>';
              return;
          }

          const uniqueDates = new Set();
          allMovieShows.forEach(s => {
              if (s.showDate) {
                  // Format as 'YYYY-MM-DD' cleanly
                  const d = new Date(s.showDate).toISOString().split('T')[0];
                  uniqueDates.add(d);
              }
          });

          const sortedDates = Array.from(uniqueDates).sort();
          dateSelect.disabled = false;
          dateSelect.innerHTML = '<option value="">Select an available date...</option>';
          
          sortedDates.forEach(dateStr => {
              // Add a day to counteract local timezone snapping back to previous day for UTC midnight
              const dt = new Date(dateStr);
              dt.setMinutes(dt.getMinutes() + dt.getTimezoneOffset());
              const displayDate = dt.toLocaleDateString([], {weekday: 'short', month:'short', day:'numeric'});
              dateSelect.innerHTML += `<option value="${dateStr}">${displayDate}</option>`;
          });
      } catch(e) {
          dateSelect.innerHTML = '<option value="">Network error</option>';
      }
  }

  function loadShowsByDate() {
      const selectedDate = document.getElementById('dateSelect').value;
      const showSelect = document.getElementById('showSelect');
      
      showSelect.innerHTML = '<option value="">Loading shows...</option>';
      showSelect.disabled = true;
      resetSelection();
      
      if(!selectedDate) {
          showSelect.innerHTML = '<option value="">First select a date</option>';
          return;
      }

      currentShows = allMovieShows.filter(s => {
          if(!s.showDate) return false;
          return new Date(s.showDate).toISOString().split('T')[0] === selectedDate;
      });

      if(currentShows.length === 0) {
          showSelect.innerHTML = '<option value="">No shows on this date</option>';
          return;
      }

      showSelect.disabled = false;
      showSelect.innerHTML = '<option value="">Select an available show...</option>';
      
      currentShows.forEach(s => {
          const time = s.showTime ? s.showTime.substring(0,5) : '--:--';
          // ShowDto has flat screenId/screenType, not nested screen object
          const scrLabel = s.screenType ? `${s.screenType} Screen` : (s.screenId ? `Screen ${s.screenId}` : 'Screen');
          
          showSelect.innerHTML += `<option value="${s.id}">${time} - ${myTheatreName} (${scrLabel})</option>`;
      });
  }


  async function loadSeats() {
      const showId = document.getElementById('showSelect').value;
      const container = document.getElementById('seatMapContainer');
      resetSelection();
      
      if(!showId) {
          container.innerHTML = `<div class="flex flex-col items-center gap-6 opacity-30 text-center"><span class="material-symbols-outlined text-6xl">grid_view</span><p class="text-sm font-medium max-w-[200px]">Select a show to visualize the auditorium</p></div>`;
          return;
      }

      container.innerHTML = '<div class="flex flex-col items-center gap-4 text-primary font-black animate-pulse"><div class="w-12 h-12 rounded-full border-4 border-primary border-t-transparent animate-spin"></div><span class="text-[10px] uppercase tracking-widest">Compiling Seating Map...</span></div>';
      
      try {
          const seatRes = await Shows.getSeats(showId);
          currentSeatsData = seatRes || [];
          
          if(currentSeatsData.length === 0) {
              container.innerHTML = '<div class="text-error font-black text-center uppercase tracking-tighter">No Seat Registry Found</div>';
              return;
          }

          renderSeatMap();
      } catch(err) {
          container.innerHTML = `<p class="text-red-500 text-sm font-bold">${err.message}</p>`;
      }
  }

  function renderSeatMap() {
      const container = document.getElementById('seatMapContainer');
      
      // Smart Grouping: Try to group by row label, but if they are numeric/unique, handle that
      const rows = {};
      currentSeatsData.forEach(s => {
         let r = s.rowNumber || 'A';
         if (!rows[r]) rows[r] = [];
         rows[r].push(s);
      });

      let gridHtml = '';
      const sortedRowNames = Object.keys(rows).sort((a,b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
      
      sortedRowNames.forEach(rowName => {
         const rowSeats = rows[rowName].sort((a,b) => (parseInt(a.seatNumber) || 0) - (parseInt(b.seatNumber) || 0));
         
         gridHtml += `<div class="flex items-center gap-3 mb-2 shrink-0">
             <div class="w-8 h-8 flex items-center justify-center text-[10px] font-black text-outline opacity-40 uppercase border border-white/5 rounded-lg">${rowName}</div>
             <div class="flex gap-2">`;
             
         rowSeats.forEach((seat, idx) => {
            // Aisle logic
            if(idx === 6 || idx === 14) {
               gridHtml += `<div class="w-10"></div>`; 
            }

            const isAvail = seat.status === 'AVAILABLE';
            const price = seat.price || 250;
            const seatLabel = seat.seatNumber.toString().padStart(2, '0');
                
            gridHtml += `
            <label class="relative group cursor-pointer" title="Seat ${rowName}${seat.seatNumber} | ₹${price}">
                <input type="checkbox" class="sr-only seat-checkbox shadow-none" value="${seat.id}" onchange="toggleSeat(this, ${price})" ${!isAvail ? 'disabled' : ''}>
                <div class="seat-box w-10 h-10 border-2 rounded-xl flex items-center justify-center text-[11px] font-bold 
                          ${isAvail ? 'bg-primary/5 border-primary/20 text-primary group-hover:bg-primary/20' : 'bg-white/5 border-white/5 text-outline/30 cursor-not-allowed opacity-50'}">
                    ${seatLabel}
                </div>
            </label>`;
         });

         gridHtml += `</div>
             <div class="w-8 h-8 flex items-center justify-center text-[10px] font-black text-outline opacity-40 uppercase border border-white/5 rounded-lg ml-3">${rowName}</div>
         </div>`;
      });
      
      container.innerHTML = `
        <!-- Cinema Screen Curve -->
        <div class="w-full max-w-lg mb-16 relative flex flex-col items-center">
            <div class="h-1.5 w-full bg-primary rounded-full shadow-[0_-15px_40px_rgba(108,59,181,0.6)] curved-screen-effect"></div>
            <span class="text-[10px] text-outline uppercase tracking-[0.6em] font-black mt-4 opacity-50">Auditorium Screen</span>
        </div>

        <div class="w-full overflow-x-auto pb-8 flex flex-col items-center hide-scrollbar">
            <div class="inline-flex flex-col items-center px-8">
                ${gridHtml}
            </div>
        </div>
        
        <!-- Premium Legend -->
        <div class="flex items-center gap-10 mt-6 pt-10 border-t border-white/5 text-[10px] font-black text-outline uppercase tracking-widest w-full justify-center">
            <div class="flex items-center gap-2 group">
                <div class="w-4 h-4 rounded-md border-2 border-primary/30 bg-primary/5"></div> 
                <span class="group-hover:text-primary transition-colors">Available</span>
            </div>
            <div class="flex items-center gap-2 group">
                <div class="w-4 h-4 rounded-md bg-primary shadow-[0_0_15px_rgba(108,59,181,0.5)]"></div> 
                <span class="text-primary group-hover:brightness-125 transition-all">Selected</span>
            </div>
            <div class="flex items-center gap-2 group">
                <div class="w-4 h-4 rounded-md bg-white/5 border border-white/5 opacity-40"></div> 
                <span class="opacity-40 group-hover:opacity-100 transition-opacity">Reserved</span>
            </div>
        </div>
      `;
  }

  let currentTotal = 0;

  function toggleSeat(checkbox, price) {
      if(checkbox.checked) {
          selectedSeatIds.add(parseInt(checkbox.value));
          currentTotal += price;
      } else {
          selectedSeatIds.delete(parseInt(checkbox.value));
          currentTotal -= price;
      }
      updateCheckoutUI();
  }

  function resetSelection() {
      selectedSeatIds.clear();
      currentTotal = 0;
      updateCheckoutUI();
  }

  function updateCheckoutUI() {
      document.getElementById('seatCount').innerText = selectedSeatIds.size;
      document.getElementById('totalPrice').innerText = '₹' + currentTotal;
      document.getElementById('bookBtn').disabled = selectedSeatIds.size === 0;
  }

  async function handleBooking(e) {
      e.preventDefault();
      
      const showId = document.getElementById('showSelect').value;
      if(selectedSeatIds.size === 0 || !showId) return;

      const user = JSON.parse(localStorage.getItem('sc_user') || "{}");
      const btn = document.getElementById('bookBtn');
      
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin font-black">autorenew</span> Printing...';
      btn.disabled = true;

      const payload = {
          customerName: document.getElementById('custName').value.trim() || "Walk-in Guest",
          customerPhone: document.getElementById('custPhone').value.trim() || undefined,
          customerEmail: undefined,
          showId: parseInt(showId),
          seatIds: Array.from(selectedSeatIds),
          counterStaffId: user.id || 1,
          paymentMode: document.getElementById('paymentMode').value,
          ticketPrice: currentTotal.toString()
      };

      try {
          const res = await CounterStaff.createBooking(payload);
          if(res) {
              showToast("Ticket Issued Successfully!", "success");
              document.getElementById('bookingForm').reset();
              loadSeats();
          }
      } catch (err) {
          showToast(err.message, "error");
      } finally {
          btn.innerHTML = '<span class="material-symbols-outlined font-black">print</span> Print Ticket';
          btn.disabled = selectedSeatIds.size === 0;
      }
  }
</script>
</body>
</html>
