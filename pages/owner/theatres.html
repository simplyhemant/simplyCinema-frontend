<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Manage Theatres | SimplyCinema Partner</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container": "#201f1f", "background": "#131313", "outline": "#968e9e", "primary-container": "#6c3bb5", "surface-container-highest": "#353534", "surface-container-low": "#1c1b1b", "primary": "#d6baff" }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] } } } }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body">

<div id="admin-sidebar-placeholder"></div>
<div id="admin-topbar-placeholder"></div>

<main class="pl-64 pt-20 min-h-screen">
  <div class="p-8 space-y-8">
    <div class="flex justify-between items-end">
      <div>
        <h1 class="font-headline text-3xl font-bold tracking-tight text-white mb-2">My Theatres</h1>
        <p class="text-outline text-sm">Register and manage your cinema properties.</p>
      </div>
      <button onclick="openCreateModal()" class="px-6 py-2.5 bg-primary text-background font-bold rounded-full hover:scale-105 transition-all flex items-center gap-2 shadow-xl">
        <span class="material-symbols-outlined text-xl">add</span> Add Theatre
      </button>
    </div>

    <div id="theatre-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
       <!-- Loaded via API -->
    </div>
  </div>
</main>

<!-- Create/Edit Modal -->
<div id="theatre-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm hidden">
    <div class="bg-surface-container border border-white/5 w-full max-w-2xl rounded-2xl p-8 shadow-2xl space-y-6 overflow-y-auto max-h-[90vh]">
        <div class="flex justify-between items-start">
            <h3 class="font-headline text-2xl font-bold text-white" id="modal-title">Add Theatre</h3>
            <button onclick="closeModal()" class="text-outline hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>

        <form id="theatre-form" class="grid grid-cols-2 gap-4">
            <input type="hidden" id="theatre-id">
            <div class="col-span-2">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Theatre Name</label>
                <input type="text" id="name" required class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>
            
            <div>
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">City</label>
                <select id="cityId" required class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
                    <!-- Cities loaded via JS -->
                </select>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Phone</label>
                <input type="text" id="phone" class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>

            <div class="col-span-2">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Address</label>
                <textarea id="address" required class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-white focus:ring-1 focus:ring-primary h-24"></textarea>
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Opening Time</label>
                <input type="time" id="openingHour" class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Closing Time</label>
                <input type="time" id="closingHour" class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>

            <div class="col-span-2">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Amenities (Comma separated)</label>
                <input type="text" id="amenities" placeholder="AC, Parking, Food Court" class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>

            <div class="col-span-2 flex items-center gap-3">
                <input type="checkbox" id="foodBeverageAvailable" class="w-5 h-5 rounded bg-surface-container-highest border-none text-primary focus:ring-offset-background">
                <label class="text-sm text-outline">Food & Beverages Available</label>
            </div>

            <div class="col-span-2 pt-4">
                <button type="submit" class="w-full py-4 bg-primary text-background font-bold rounded-xl hover:brightness-110 transition-all shadow-lg uppercase tracking-widest">Save Theatre</button>
            </div>
        </form>
    </div>
</div>

<script>
  injectComponent("#admin-sidebar-placeholder", "../../components/admin-sidebar.html");
  injectComponent("#admin-topbar-placeholder", "../../components/admin-topbar.html");

  const modal = document.getElementById('theatre-modal');
  const form = document.getElementById('theatre-form');
  const user = getSession();

  document.addEventListener('DOMContentLoaded', async () => {
      requireAuth(['THEATRE_OWNER']);
      loadCities();
      fetchMyTheatres();
  });

  async function loadCities() {
      const select = document.getElementById('cityId');
      select.innerHTML = '<option value="" disabled selected>Loading cities...</option>';
      try {
          const cities = await Cities.getActive();
          if (!cities || cities.length === 0) {
              select.innerHTML = '<option value="" disabled selected>No cities available</option>';
              return;
          }
          select.innerHTML = '<option value="" disabled selected>Select City</option>' + 
                            cities.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      } catch(e) { 
          console.error("Failed to load cities", e);
          select.innerHTML = '<option value="" disabled selected>Error loading cities</option>';
      }
  }

  async function fetchMyTheatres() {
      const container = document.getElementById('theatre-list');
      container.innerHTML = '<div class="col-span-full py-20 text-center text-outline">Fetching theatres...</div>';
      
      try {
          // Backend API: GET /api/theatre/owner/list/{ownerId}
          const res = await Theatres.getByOwner(user.id);
          if(!res || res.length === 0) {
              container.innerHTML = '<div class="col-span-full py-20 text-center text-outline bg-surface-container rounded-2xl border border-white/5">You haven\'t added any theatres yet.</div>';
              return;
          }
          
          container.innerHTML = '';
          res.forEach(t => {
              const card = document.createElement('div');
              card.className = "bg-surface-container-low border border-white/5 rounded-2xl p-6 space-y-4 hover:border-primary/30 transition-all";
              card.innerHTML = `
                  <div class="flex justify-between items-start">
                    <div class="p-3 bg-primary/10 rounded-xl">
                        <span class="material-symbols-outlined text-primary text-3xl">theater_comedy</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='openEditModal(${JSON.stringify(t).replace(/'/g, "&apos;")})' class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                        <button onclick="deleteTheatre(${t.id})" class="p-2 text-outline hover:text-error transition-colors"><span class="material-symbols-outlined text-sm">delete</span></button>
                    </div>
                  </div>
                  <div>
                    <h3 class="font-headline text-lg font-bold text-white mb-1">${t.name}</h3>
                    <p class="text-xs text-outline flex items-center gap-1"><span class="material-symbols-outlined text-xs">location_on</span> ${t.cityName || 'Unknown City'}</p>
                  </div>
                  <div class="text-[10px] py-1 px-2 bg-white/5 rounded inline-block text-outline">
                    ${t.openingHour ? `${t.openingHour} - ${t.closingHour}` : 'Hours not set'}
                  </div>
                  <div class="pt-4 border-t border-white/5 flex items-center justify-between">
                    <div class="flex flex-wrap gap-2">
                        ${(t.amenities || []).slice(0,2).map(a => `<span class="bg-primary/10 text-primary text-[9px] px-2 py-0.5 rounded font-bold uppercase">${a}</span>`).join('')}
                    </div>
                    <a href="../../pages/owner/screens.html?theatreId=${t.id}" class="flex items-center gap-1 text-primary text-[10px] font-bold uppercase hover:underline">
                        Screens <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
                    </a>
                  </div>
              `;
              container.appendChild(card);
          });
      } catch(e) {
          console.error("Error fetching theatres:", e);
          container.innerHTML = '<div class="col-span-full py-20 text-center text-outline bg-surface-container rounded-2xl border border-white/5">You haven\'t added any theatres yet.</div>';
      }
  }

  function openCreateModal() {
      document.getElementById('modal-title').innerText = "Add Theatre";
      form.reset();
      document.getElementById('theatre-id').value = "";
      modal.classList.remove('hidden');
  }

  function openEditModal(t) {
      document.getElementById('modal-title').innerText = "Edit Theatre";
      document.getElementById('theatre-id').value = t.id;
      document.getElementById('name').value = t.name;
      document.getElementById('cityId').value = t.city?.id || t.cityId;
      document.getElementById('phone').value = t.phone || "";
      document.getElementById('address').value = t.address || "";
      document.getElementById('openingHour').value = t.openingHour || "";
      document.getElementById('closingHour').value = t.closingHour || "";
      document.getElementById('amenities').value = (t.amenities || []).join(", ");
      document.getElementById('foodBeverageAvailable').checked = t.foodBeverageAvailable;
      modal.classList.remove('hidden');
  }

  function closeModal() {
      modal.classList.add('hidden');
  }

  form.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('theatre-id').value;
      const data = {
          name: document.getElementById('name').value,
          ownerId: user.id,
          cityId: Number(document.getElementById('cityId').value),
          address: document.getElementById('address').value,
          phone: document.getElementById('phone').value,
          email: user.email,
          openingHour: document.getElementById('openingHour').value,
          closingHour: document.getElementById('closingHour').value,
          amenities: document.getElementById('amenities').value.split(",").map(a => a.trim()).filter(a => a),
          foodBeverageAvailable: document.getElementById('foodBeverageAvailable').checked
      };

      try {
          showLoader();
          if(id) {
              await Theatres.update(id, data);
              showToast("Theatre updated successfully");
          } else {
              await Theatres.create(data);
              showToast("Theatre added successfully");
          }
          closeModal();
          fetchMyTheatres();
      } catch(err) {
          showToast(err.message || "Failed to save theatre", "error");
      } finally {
          hideLoader();
      }
  };

  async function deleteTheatre(id) {
      if(!confirm("Are you sure you want to remove this theatre and all its screens?")) return;
      try {
          showLoader();
          await Theatres.delete(id);
          showToast("Theatre removed");
          fetchMyTheatres();
      } catch(err) {
          showToast("Failed to delete", "error");
      } finally {
          hideLoader();
      }
  }
</script>
</body>
</html>
