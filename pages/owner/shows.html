<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Schedule Shows | SimplyCinema Partner</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container": "#201f1f", "background": "#131313", "outline": "#968e9e", "primary-container": "#6c3bb5", "surface-container-highest": "#353534", "surface-container-low": "#1c1b1b", "primary": "#d6baff", "error": "#ffb4ab" }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] } } } }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-background text-on-background font-body overflow-x-hidden">

<div id="admin-sidebar-placeholder"></div>
<div id="admin-topbar-placeholder"></div>

<main class="pl-64 pt-20 min-h-screen">
  <div class="p-8 space-y-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 pb-2">
      <div>
        <h1 class="font-headline text-4xl font-black bg-gradient-to-r from-white via-white to-primary bg-clip-text text-transparent tracking-tight mb-2">Schedule Shows</h1>
        <div class="flex items-center gap-4 bg-white/5 p-2 pr-4 rounded-2xl border border-white/5 backdrop-blur-md">
          <div class="flex items-center gap-3 pl-2">
            <span class="material-symbols-outlined text-outline text-lg">theater_comedy</span>
            <select id="theatre-selector" onchange="onTheatreChange()" class="bg-transparent border-none rounded-lg text-sm text-white px-2 h-10 focus:ring-0 font-bold min-w-[200px] cursor-pointer hover:text-primary transition-colors">
              <option value="">Select a Theatre</option>
            </select>
          </div>
          <div class="w-[1px] h-6 bg-white/10"></div>
          <p class="text-outline text-[10px] uppercase font-bold tracking-widest hidden lg:block" id="theatre-subtitle">Manage Screenings</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
          <div id="stats-summary" class="hidden md:flex items-center gap-6 px-6 py-3 bg-white/5 rounded-2xl border border-white/5 backdrop-blur-md">
             <div class="flex flex-col">
                <span class="text-[9px] text-outline uppercase font-black tracking-widest">Active Shows</span>
                <span id="active-shows-count" class="text-white font-headline font-bold">--</span>
             </div>
          </div>
          <button onclick="openCreateModal()" id="add-show-btn" disabled class="px-8 py-3.5 bg-primary text-background font-black rounded-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3 shadow-[0_10px_40px_-10px_rgba(214,186,255,0.5)] opacity-50 cursor-not-allowed uppercase tracking-widest text-xs">
            <span class="material-symbols-outlined text-lg">add_circle</span> New Schedule
          </button>
      </div>
    </div>

    <div class="bg-surface-container-low/40 backdrop-blur-xl rounded-[2rem] border border-white/10 overflow-hidden shadow-2xl">
        <div class="grid grid-cols-12 gap-6 p-6 bg-white/5 border-b border-white/10 text-[9px] uppercase font-black text-outline tracking-[0.2em] items-center">
            <div class="col-span-4 pl-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-xs">movie</span> MOVIE & SCREEN
            </div>
            <div class="col-span-3 flex items-center gap-2">
                <span class="material-symbols-outlined text-xs">event</span> SCHEDULE
            </div>
            <div class="col-span-2 flex items-center gap-2">
                <span class="material-symbols-outlined text-xs">payments</span> PRICING
            </div>
            <div class="col-span-1 flex items-center gap-2">
                <span class="material-symbols-outlined text-xs">info</span> STATUS
            </div>
            <div class="col-span-2 text-right pr-4">ACTIONS</div>
        </div>
        <div id="shows-list" class="divide-y divide-white/5">
            <div class="p-20 text-center text-outline">Please select a theatre first.</div>
        </div>
    </div>
  </div>
</main>

<!-- Create/Edit Modal -->
<div id="show-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm hidden">
    <div class="bg-surface-container border border-white/5 w-full max-w-2xl rounded-2xl p-8 shadow-2xl space-y-6 overflow-y-auto max-h-[95vh]">
        <div class="flex justify-between items-start">
            <h3 class="font-headline text-2xl font-bold text-white" id="modal-title">Schedule New Show</h3>
            <button onclick="closeModal()" class="text-outline hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>

        <form id="show-form" class="grid grid-cols-2 gap-6">
            <input type="hidden" id="show-id">
            
            <div class="col-span-2 md:col-span-1">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Select Movie</label>
                <select id="movieId" required onchange="onMovieChange()" class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary"></select>
                <p id="movie-info" class="text-[9px] text-primary/60 mt-1 uppercase font-black tracking-widest hidden"></p>
            </div>

            <div class="col-span-2 md:col-span-1">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Select Screen</label>
                <select id="screenId" required onchange="updateCompatibleFormats()" class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary"></select>
                <p id="screen-info" class="text-[9px] text-primary/60 mt-1 uppercase font-black tracking-widest hidden"></p>
            </div>

            <div class="col-span-2 md:col-span-1">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Show Date</label>
                <input type="date" id="showDate" required class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>

            <div class="col-span-2 md:col-span-1">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Start Time</label>
                <input type="time" id="showTime" required class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
            </div>

            <div class="col-span-2 md:col-span-1">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Language</label>
                <select id="languageId" required class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
                    <option value="">Select Language</option>
                </select>
            </div>

            <div class="col-span-2 md:col-span-1">
                <label class="text-[10px] uppercase font-bold text-outline tracking-widest block mb-2">Format</label>
                <select id="formatId" required class="w-full bg-surface-container-highest border-none rounded-lg h-12 px-4 text-white focus:ring-1 focus:ring-primary">
                    <option value="">Select Format</option>
                </select>
            </div>

            <div class="col-span-2 border-t border-white/5 pt-4">
                <h4 class="text-white font-bold text-sm mb-4">Pricing Configuration (INR)</h4>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="text-[9px] uppercase font-bold text-outline tracking-widest block mb-2">Regular</label>
                        <input type="number" id="price-REGULAR" required value="250" class="w-full bg-surface-container-highest border-none rounded-lg h-10 px-3 text-white text-sm focus:ring-1 focus:ring-primary">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-bold text-outline tracking-widest block mb-2">Premium</label>
                        <input type="number" id="price-PREMIUM" required value="450" class="w-full bg-surface-container-highest border-none rounded-lg h-10 px-3 text-white text-sm focus:ring-1 focus:ring-primary">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-bold text-outline tracking-widest block mb-2">VIP</label>
                        <input type="number" id="price-VIP" required value="800" class="w-full bg-surface-container-highest border-none rounded-lg h-10 px-3 text-white text-sm focus:ring-1 focus:ring-primary">
                    </div>
                </div>
            </div>

            <div class="col-span-2 pt-4">
                <button type="submit" class="w-full py-4 bg-primary text-background font-bold rounded-xl hover:brightness-110 transition-all shadow-lg uppercase tracking-widest">Confirm Schedule</button>
            </div>
        </form>
    </div>
</div>

<script>
  injectComponent("#admin-sidebar-placeholder", "../../components/admin-sidebar.html");
  injectComponent("#admin-topbar-placeholder", "../../components/admin-topbar.html");

  const modal = document.getElementById('show-modal');
  const form = document.getElementById('show-form');
  const theatreSelector = document.getElementById('theatre-selector');
  const addBtn = document.getElementById('add-show-btn');
  const user = getSession();

  let movies = [];
  let currentTheatreScreens = [];

  document.addEventListener('DOMContentLoaded', async () => {
      requireAuth(['THEATRE_OWNER']);
      await Promise.all([loadMyTheatres(), loadMovies(), loadMetadata()]);
  });

  async function loadMovies() {
      try {
          const res = await Movies.getAll(0, 500) || {};
          movies = res.content || [];
          const select = document.getElementById('movieId');
          if (movies.length === 0) {
              select.innerHTML = '<option value="">No movies available</option>';
              return;
          }
          select.innerHTML = '<option value="" disabled selected>Select a Movie</option>' +
              movies.map(m => `<option value="${m.id}">${m.title}${m.durationMinutes ? ' (' + m.durationMinutes + 'm)' : ''}</option>`).join('');
      } catch(e) {}
  }

  let allLanguages = [];
  const formatDisplayNames = {
      'TWO_D': '2D',
      'THREE_D': '3D',
      'IMAX': 'IMAX',
      'FOUR_DX': '4DX'
  };

  async function loadMetadata() {
    try {
        const langs = await Languages.getAll();
        allLanguages = langs || [];
    } catch(e) {}
  }

  async function onMovieChange() {
    const movieId = document.getElementById('movieId').value;
    const langSelect = document.getElementById('languageId');
    const formatSelect = document.getElementById('formatId');

    if (!movieId) {
        langSelect.innerHTML = '<option value="">Select Language</option>';
        formatSelect.innerHTML = '<option value="">Select Format</option>';
        return;
    }

    let movie = movies.find(m => m.id == movieId);
    if (!movie) return;

    // If movie doesn't have formats/languages (stale data), fetch full details
    // Now checking for 'formats' instead of 'formatIds'
    if ((!movie.formats || movie.formats.length === 0) && (!movie.languageIds || movie.languageIds.length === 0)) {
        try {
            console.log("Fetching full movie details for:", movieId);
            const latestMovie = await Movies.getById(movieId);
             // Update the movie object in our list
            const idx = movies.findIndex(m => m.id == movieId);
            if(idx !== -1) movies[idx] = latestMovie;
            movie = latestMovie;
        } catch(e) {
            console.error("Failed to fetch movie details:", e);
        }
    }

    console.log("Movie selected:", movie.title, "Languages:", movie.languageIds, "AllLangs:", allLanguages.length);

    // Populate Languages for this movie
    const movieLangs = allLanguages.filter(l => movie.languageIds?.includes(l.id));
    langSelect.innerHTML = '<option value="">Select Language</option>' + 
        movieLangs.map(l => `<option value="${l.id}">${l.name}</option>`).join('');

    // Trigger format update based on both movie and screen
    updateCompatibleFormats();
  }

  const SCREEN_COMPATIBILITY = {
      'REGULAR': ['TWO_D'],
      'THREE_D': ['TWO_D', 'THREE_D'],
      'IMAX': ['TWO_D', 'IMAX'],
      'FOUR_DX': ['TWO_D', 'FOUR_DX'],
      'DOLBY_ATMOS': ['TWO_D']
  };

  function updateCompatibleFormats() {
      const movieId = document.getElementById('movieId').value;
      const screenId = document.getElementById('screenId').value;
      const formatSelect = document.getElementById('formatId');
      const screenInfo = document.getElementById('screen-info');
      const movieInfo = document.getElementById('movie-info');

      if (!movieId || !screenId) {
          formatSelect.innerHTML = '<option value="">Select Format</option>';
          if (!movieId) movieInfo.classList.add('hidden');
          if (!screenId) screenInfo.classList.add('hidden');
          return;
      }

      const movie = movies.find(m => m.id == movieId);
      const screen = currentTheatreScreens.find(s => s.id == screenId);

      if (!movie || !screen) return;

      // Show movie formats info
      const movieFormats = movie.formats || [];
      movieInfo.innerText = `Available: ${movieFormats.map(f => formatDisplayNames[f] || f).join(', ')}`;
      movieInfo.classList.remove('hidden');

      // Show screen type info
      screenInfo.innerText = `Technical: ${screen.screenType || 'REGULAR'}`;
      screenInfo.classList.remove('hidden');
      const supportedByScreen = SCREEN_COMPATIBILITY[screen.screenType] || ['TWO_D'];

      // Intersection: Formats supported by both movie AND screen
      const compatibleFormats = movieFormats.filter(f => supportedByScreen.includes(f));

      formatSelect.innerHTML = '<option value="">Select Format</option>' + 
          compatibleFormats.map(f => `<option value="${f}">${formatDisplayNames[f] || f}</option>`).join('');

      if (compatibleFormats.length === 0) {
          formatSelect.innerHTML = '<option value="">No Compatible Formats</option>';
          showToast("Warning: This screen cannot play any of the movie's available formats.", "error");
      }
  }

  async function loadMyTheatres() {
      const container = document.getElementById('shows-list');
      try {
          if (!user || !user.id) {
              console.warn("User ID missing, redirecting to login...");
              window.location.href = "/pages/auth/login";
              return;
          }

          const theatres = await Theatres.getByOwner(user.id) || [];
          if (theatres.length === 0) {
              theatreSelector.innerHTML = '<option value="">No Theatres Found</option>';
              container.innerHTML = `
                <div class="p-20 text-center space-y-4">
                    <span class="material-symbols-outlined text-outline/20 text-7xl">theaters</span>
                    <p class="text-outline text-lg underline-offset-4 decoration-primary/30 font-medium">No theatres found for your account.</p>
                    <a href="theatres.html" class="inline-flex items-center gap-2 px-6 py-2 bg-white/5 rounded-xl text-primary hover:bg-white/10 transition-colors font-bold text-sm tracking-widest uppercase"><span class="material-symbols-outlined">add</span> Add Theatre</a>
                </div>`;
              return;
          }

          theatreSelector.innerHTML = theatres.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
          
          // Auto-select first theatre
          theatreSelector.value = theatres[0].id;
          onTheatreChange();

      } catch(e) {
          console.error("Failed to load theatres:", e);
          container.innerHTML = `
            <div class="p-24 text-center space-y-6">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-error/10 text-error mb-2">
                    <span class="material-symbols-outlined text-4xl">error_outline</span>
                </div>
                <div>
                   <h3 class="text-xl font-bold text-white mb-2 tracking-tight">Failed to load dashboard</h3>
                   <p class="text-outline text-sm max-w-md mx-auto">We encountered an error while fetching your theatre data. Please check your connection or try again.</p>
                </div>
                <button onclick="loadMyTheatres()" class="px-8 py-3 bg-white/5 text-white rounded-2xl hover:bg-white/10 transition-all font-black uppercase tracking-widest text-[10px] flex items-center gap-3 mx-auto border border-white/5">
                    <span class="material-symbols-outlined text-lg">refresh</span> Retry Now
                </button>
            </div>`;
      }
  }

  async function onTheatreChange() {
      const theatreId = theatreSelector.value;
      if (!theatreId) {
          addBtn.disabled = true;
          addBtn.classList.add('opacity-50', 'cursor-not-allowed');
          document.getElementById('shows-list').innerHTML = '<div class="p-20 text-center text-outline">Please select a theatre first.</div>';
          return;
      }

      addBtn.disabled = false;
      addBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      
      try {
          currentTheatreScreens = await Screens.getByTheatre(theatreId);
          const screenSelect = document.getElementById('screenId');
          screenSelect.innerHTML = currentTheatreScreens.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
          fetchShows(theatreId);
      } catch(e) {}
  }

  async function fetchShows(theatreId) {
      const container = document.getElementById('shows-list');
      const statsSummary = document.getElementById('stats-summary');
      const activeCountEl = document.getElementById('active-shows-count');
      
      container.innerHTML = `
        <div class="p-20 text-center flex flex-col items-center gap-4 animate-pulse">
            <span class="material-symbols-outlined text-outline text-5xl">sync</span>
            <p class="text-outline text-xs uppercase font-black tracking-widest">Fetching screenings...</p>
        </div>`;
      
      try {
          const res = await Shows.getByTheatre(theatreId);
          if(!res || res.length === 0) {
              container.innerHTML = `
                <div class="p-20 text-center space-y-4">
                    <span class="material-symbols-outlined text-outline/20 text-7xl">event_busy</span>
                    <p class="text-outline text-lg font-medium">No shows scheduled yet for this theatre.</p>
                    <button onclick="openCreateModal()" class="text-primary hover:underline font-bold text-sm uppercase tracking-widest">Schedule your first show</button>
                </div>`;
              activeCountEl.innerText = "0";
              statsSummary.classList.remove('hidden');
              return;
          }
          
          activeCountEl.innerText = res.filter(s => s.status === 'ACTIVE').length || res.length;
          statsSummary.classList.remove('hidden');

          container.innerHTML = '';
          res.forEach(s => {
              const screen = currentTheatreScreens.find(scr => scr.id == s.screenId) || { name: 'Unknown Screen' };
              const posterUrl = s.moviePosterUrl || 'https://via.placeholder.com/300x450?text=No+Poster';
              
              const row = document.createElement('div');
              row.className = "grid grid-cols-12 gap-6 p-6 items-center hover:bg-white/5 transition-all group border-b border-white/5 last:border-0";
              row.innerHTML = `
                  <div class="col-span-4 flex items-center gap-4">
                    <img src="${posterUrl}" class="w-12 h-16 rounded-md object-cover shadow-lg border border-white/10 group-hover:scale-110 transition-transform" />
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-white font-bold tracking-tight">${s.movieTitle || 'Unknown Movie'}</span>
                            <span class="px-1.5 py-0.5 bg-primary/10 text-primary text-[8px] rounded-sm font-black uppercase tracking-tighter border border-primary/20">${s.formatName || '2D'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                             <span class="text-[9px] text-outline font-bold uppercase tracking-widest">${screen.name}</span>
                             <span class="w-1 h-1 rounded-full bg-outline/30"></span>
                             <span class="text-[9px] text-outline font-medium uppercase tracking-widest">${s.languageName || 'Unknown'}</span>
                        </div>
                    </div>
                  </div>
                  
                  <div class="col-span-3 flex flex-col">
                    <div class="flex items-center gap-2 text-white">
                        <span class="material-symbols-outlined text-sm text-outline">calendar_today</span>
                        <span class="text-sm font-medium">${formatShowDate(s.showDate)}</span>
                    </div>
                    <div class="flex items-center gap-2 text-primary mt-1">
                        <span class="material-symbols-outlined text-sm">schedule</span>
                        <span class="text-xs font-black tracking-widest">${formatShowTime(s.showTime)}</span>
                    </div>
                  </div>

                  <div class="col-span-2 flex flex-col justify-center">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-outline uppercase font-bold tracking-tighter mb-1">Starting From</span>
                        <span class="text-white font-headline text-lg font-bold">₹${s.minPrice || 0}</span>
                    </div>
                  </div>

                  <div class="col-span-1">
                    ${(() => {
                        const status = s.status || 'UPCOMING';
                        const isActive = s.isActive !== false;
                        if (!isActive || status === 'CANCELLED') {
                            return `<span class="px-2.5 py-1 bg-error/10 text-error text-[9px] rounded-full font-black uppercase tracking-widest border border-error/20">Cancelled</span>`;
                        }
                        if (status === 'ACTIVE') {
                            return `<span class="px-2.5 py-1 bg-green-500/10 text-green-500 text-[9px] rounded-full font-black uppercase tracking-widest border border-green-500/20">Active</span>`;
                        }
                        return `<span class="px-2.5 py-1 bg-primary/10 text-primary text-[9px] rounded-full font-black uppercase tracking-widest border border-primary/20">${status}</span>`;
                    })()}
                  </div>

                  <div class="col-span-2 text-right flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick='openEditModal(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5 text-outline hover:text-primary hover:bg-primary/10 transition-all" title="Edit Show"><span class="material-symbols-outlined text-lg">edit</span></button>
                    <button onclick="deleteShow(${s.id})" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5 text-outline hover:text-error hover:bg-error/10 transition-all" title="Delete Show"><span class="material-symbols-outlined text-lg">delete</span></button>
                  </div>
              `;
              container.appendChild(row);
          });
      } catch(e) {
          container.innerHTML = '<div class="p-20 text-center text-error">Failed to load shows.</div>';
      }
  }

  // Helper: format "2026-04-01" -> "01 Apr"
  function formatShowDate(dateStr) {
      if (!dateStr) return '--';
      try {
          const [year, month, day] = dateStr.split('-');
          const d = new Date(Number(year), Number(month) - 1, Number(day));
          return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
      } catch(e) { return dateStr; }
  }

  // Helper: format "10:00:00" or "10:00" -> "10:00 AM"
  function formatShowTime(timeStr) {
      if (!timeStr) return '--';
      try {
          const [h, m] = timeStr.split(':');
          const d = new Date();
          d.setHours(parseInt(h), parseInt(m), 0);
          return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
      } catch(e) { return timeStr; }
  }

  function openCreateModal() {
      document.getElementById('modal-title').innerText = "Schedule New Show";
      form.reset();
      document.getElementById('show-id').value = "";
      modal.classList.remove('hidden');
  }

  async function openEditModal(s) {
      document.getElementById('modal-title').innerText = "Edit Show Timing";
      document.getElementById('show-id').value = s.id;
      document.getElementById('movieId').value = s.movieId;
      document.getElementById('screenId').value = s.screenId;
      document.getElementById('showDate').value = s.showDate;
      document.getElementById('showTime').value = s.showTime;
      
      // Trigger metadata population for selected movie
      await onMovieChange();
      
      document.getElementById('languageId').value = s.languageId || "";
      document.getElementById('formatId').value = s.format || "";
      
      document.getElementById('price-REGULAR').value = s.seatPrices?.REGULAR || s.seatPrices?.STANDARD || 250;
      document.getElementById('price-PREMIUM').value = s.seatPrices?.PREMIUM || 450;
      document.getElementById('price-VIP').value = s.seatPrices?.VIP || 800;
      
      modal.classList.remove('hidden');
  }

  function closeModal() {
      modal.classList.add('hidden');
  }

  form.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('show-id').value;
      const data = {
          movieId: Number(document.getElementById('movieId').value),
          screenId: Number(document.getElementById('screenId').value),
          showDate: document.getElementById('showDate').value,
          showTime: document.getElementById('showTime').value,
          languageId: Number(document.getElementById('languageId').value),
          format: document.getElementById('formatId').value,
          status: "UPCOMING",
          seatPrices: {
              REGULAR: Number(document.getElementById('price-REGULAR').value),
              STANDARD: Number(document.getElementById('price-REGULAR').value),
              PREMIUM: Number(document.getElementById('price-PREMIUM').value),
              VIP: Number(document.getElementById('price-VIP').value)
          }
      };

      try {
          showLoader();
          let result;
          if(id) {
              result = await Shows.update(id, data);
              if(result !== null) {
                  showToast("Show updated successfully");
              }
          } else {
              result = await Shows.create(data);
              if(result !== null) {
                  showToast("Show scheduled successfully");
              }
          }
          if(result !== null) {
              closeModal();
              await fetchShows(theatreSelector.value);
          }
      } catch(err) {
          showToast(err.message || "Failed to save show", "error");
      } finally {
          hideLoader();
      }
  };

  async function deleteShow(id) {
      if(!confirm("Cancel this show? Note: This will affect active bookings.")) return;
      try {
          showLoader();
          const result = await Shows.delete(id);
          if(result !== null) {
              showToast("Show cancelled");
              await fetchShows(theatreSelector.value);
          }
      } catch(err) {
          showToast("Failed to delete", "error");
      } finally {
          hideLoader();
      }
  }
</script>
</body>
</html>
