<!-- TopAppBar Component for Admin and Theatre Owner -->
<header class="fixed top-0 right-0 left-64 h-20 z-40 bg-background/80 backdrop-blur-xl font-body text-sm tracking-wide flex justify-between items-center px-8 w-[calc(100%-16rem)] border-b border-white/5 shadow-sm">
    <div class="flex items-center gap-4 bg-surface-container px-4 py-2 rounded-full w-96 border border-white/5 focus-within:ring-2 focus-within:ring-primary/50 transition-all">
        <span class="material-symbols-outlined text-outline">search</span>
        <input class="bg-transparent border-none focus:ring-0 text-sm w-full text-white placeholder-outline outline-none" placeholder="Search analytics, movies, or users..." type="text"/>
    </div>
    <div class="flex items-center gap-6">
        <div class="flex flex-col items-end">
            <span class="text-[10px] text-primary font-bold uppercase tracking-widest">SimplyCinema Platform</span>
            <span class="text-[10px] text-outline">v2.4.0</span>
        </div>
        <div class="flex items-center gap-3">
            <a id="exit-app-btn" href="/pages/customer/home.html" class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-high border border-white/10 text-outline hover:text-white transition-all text-xs font-bold">
                <span class="material-symbols-outlined text-[16px]">storefront</span>
                Exit to App
            </a>
        </div>
    </div>
</header>

<script>
    (() => {
        if (typeof getRole === 'function') {
            const role = getRole();
            if (role === 'THEATRE_OWNER' || role === 'THEATRE_STAFF') {
                const btn = document.getElementById('exit-app-btn');
                if (btn) btn.style.display = 'none';
            }
        }
    })();
</script>
